/v1/tenants/me/diagnostics:
  get:
    operationId: get_tenant_doctor
    summary: Tenant doctor — provider posture
    description: >
      Returns the resolver's view of the tenant's LLM provider posture as a
      `tenant_provider` block. Covers both platform-managed (synthesised
      default OR explicit reset) and BYOK modes. The api_key is never
      serialised. User-fixable BYOK errors (credential row missing,
      malformed credential JSON) surface as an `error_label` field rather
      than a 5xx so the client doctor can report them as actionable
      findings; operator-side errors (platform key missing, tenant has no
      workspace) still 5xx.
    tags:
    - Tenant
    responses:
      '200':
        description: Tenant provider posture
        content:
          application/json:
            schema:
              type: object
              required:
              - tenant_provider
              properties:
                tenant_provider:
                  type: object
                  required:
                  - mode
                  - provider
                  - model
                  - context_cap_tokens
                  - credential_ref
                  - error_label
                  properties:
                    mode:
                      type: string
                      enum:
                      - platform
                      - byok
                      description: Active posture for the tenant.
                    provider:
                      type: string
                      description: >
                        Provider name (e.g. fireworks, anthropic, openai).
                        Under platform mode, read from the active
                        core.platform_llm_keys row.
                    model:
                      type: string
                      description: Resolved model id (e.g. accounts/fireworks/models/kimi-k2.6).
                    context_cap_tokens:
                      type: integer
                      format: int64
                      description: Resolved context window cap in tokens.
                    credential_ref:
                      type: string
                      nullable: true
                      description: User-named vault key holding the BYOK credential. Null under platform mode.
                    error_label:
                      type: string
                      nullable: true
                      enum:
                      - credential_missing
                      - credential_data_malformed
                      - null
                      description: >
                        Set when BYOK resolution failed at a user-fixable
                        point — credential row missing from vault, or stored
                        JSON missing required fields. Null on success.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
