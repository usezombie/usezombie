/v1/slack/callback:
  get:
    operationId: slack_callback
    summary: Slack OAuth redirect target
    description: Exchanges the OAuth code for a team access token and persists team→workspace binding. Validates the HMAC-signed
      state nonce.
    tags:
    - Slack
    parameters:
    - name: code
      in: query
      required: true
      schema:
        type: string
    - name: state
      in: query
      required: true
      schema:
        type: string
    responses:
      '302':
        description: Redirect to the post-install page in the UseZombie dashboard.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/slack/events:
  post:
    operationId: slack_events
    summary: Receive Slack Events API callbacks
    description: Entry point for Slack Events API deliveries (message, app_mention, etc.). Verified via the `X-Slack-Signature`
      HMAC header; all other auth headers are ignored. Returns 200 immediately to satisfy Slack's 3s ack budget.
    tags:
    - Slack
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Slack Events API payload (opaque).
    responses:
      '200':
        description: Acknowledged.
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/slack/install:
  get:
    operationId: slack_install
    summary: Begin Slack OAuth install
    description: Redirects the user to Slack's OAuth consent screen. Used by the workspace owner to install the UseZombie
      Slack app.
    tags:
    - Slack
    responses:
      '302':
        description: Redirect to Slack OAuth consent URL.
      '500':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/slack/interactions:
  post:
    operationId: slack_interactions
    summary: Receive Slack interactivity callbacks
    description: Entry point for Slack Block Kit / shortcut / modal submissions. Verified via the `X-Slack-Signature` HMAC
      header. Form-encoded body per Slack's spec.
    tags:
    - Slack
    requestBody:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              payload:
                type: string
                description: JSON-encoded interaction payload.
    responses:
      '200':
        description: Acknowledged.
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
