          schema:
            type: object
            required:
            - grant_id
            - decision
            - signature
            properties:
              grant_id:
                type: string
              decision:
                type: string
                enum:
                - approved
                - rejected
              signature:
                type: string
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
