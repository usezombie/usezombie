/v1/webhooks/{zombie_id}/github:
  post:
    operationId: github_webhook
    summary: Ingest a GitHub Actions webhook
    description: GitHub `workflow_run` webhook receiver. Body is HMAC-SHA256 signed (X-Hub-Signature-256) against the workspace's
      `zombie:github` credential `webhook_secret` field. Only `action=completed` with `conclusion=failure` is XADDed to the
      zombie event stream; other events return 204. Idempotency keyed on `X-GitHub-Delivery` for 24h.
    tags:
    - Webhooks
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie that owns this webhook receiver.
      schema:
        type: string
        format: uuid
    - name: X-GitHub-Event
      in: header
      required: true
      description: GitHub event type. Only `workflow_run` is ingested.
      schema:
        type: string
    - name: X-GitHub-Delivery
      in: header
      required: true
      description: GitHub-issued delivery UUID. Used as the dedupe key.
      schema:
        type: string
    - name: X-Hub-Signature-256
      in: header
      required: true
      description: HMAC-SHA256 of the raw body, prefixed with `sha256=`.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Raw GitHub webhook payload — see https://docs.github.com/en/webhooks/webhook-events-and-payloads#workflow_run.
    responses:
      '202':
        description: Event accepted and enqueued.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                event_id:
                  type: string
      '200':
        description: Duplicate delivery (idempotency hit) or event ignored (non-workflow_run, non-completed action, or non-failure conclusion). Body distinguishes the two via the `deduped` or `ignored` field.
        content:
          application/json:
            schema:
              type: object
              properties:
                deduped:
                  type: boolean
                ignored:
                  type: string
                  description: Reason the event was filtered out (e.g. `non_failure_conclusion`).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{zombie_id}/approval:
  post:
    operationId: approval_webhook
    summary: Resolve a zombie approval gate
    description: Called by a human (via email link or Slack action) to approve or reject a paused zombie. Body is HMAC-signed
      by the issuer; the signature is verified against the zombie's webhook secret.
    tags:
    - Webhooks
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - decision
            - signature
            properties:
              decision:
                type: string
                enum:
                - approved
                - rejected
              signature:
                type: string
                description: HMAC signature over the body.
              reason:
                type: string
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{zombie_id}/grant-approval:
  post:
    operationId: grant_approval_webhook
    summary: Approve or reject an integration grant request
    description: Human-in-the-loop approval webhook for integration grant requests (Slack, GitHub, etc.). HMAC-signed.
    tags:
    - Webhooks
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - grant_id
            - decision
            - signature
            properties:
              grant_id:
                type: string
              decision:
                type: string
                enum:
                - approved
                - rejected
              signature:
                type: string
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/svix/{zombie_id}:
  post:
    operationId: receive_svix_webhook
    summary: Receive a Svix-signed webhook (Clerk events)
    description: Ingress endpoint for Svix-signed webhooks (e.g. Clerk user lifecycle events). Signature is verified by
      the webhook auth middleware against the workspace's Svix secret before the handler runs. Body shape is
      event-specific and defined by the upstream issuer; the server validates the envelope and dispatches to the zombie's
      event log.
    tags:
    - Webhooks
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie receiving the webhook.
      schema:
        type: string
        format: uuid
    - name: svix-id
      in: header
      required: true
      description: Svix message identifier (used for deduplication and signature binding).
      schema:
        type: string
    - name: svix-timestamp
      in: header
      required: true
      description: Unix timestamp of the Svix delivery (used for replay protection).
      schema:
        type: string
    - name: svix-signature
      in: header
      required: true
      description: Space-separated list of Svix signatures (v1 scheme).
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Opaque event envelope; upstream issuer (Svix) defines the payload shape per event type.
            additionalProperties: true
    responses:
      '202':
        description: Webhook accepted and queued for processing.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - accepted
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
