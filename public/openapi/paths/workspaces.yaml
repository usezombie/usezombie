/v1/workspaces:
  post:
    operationId: create_workspace
    summary: Create a workspace
    description: Creates a new workspace linked to a GitHub repository. Returns the workspace ID and a GitHub App install
      URL if the app is not yet installed on the repo.
    tags:
    - Workspaces
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - repo_url
            properties:
              repo_url:
                type: string
                format: uri
                description: Full GitHub repository URL (e.g. https://github.com/org/repo)
              default_branch:
                type: string
                description: Default branch name, defaults to 'main' if omitted
    responses:
      '201':
        description: Workspace created
        content:
          application/json:
            schema:
              type: object
              required:
              - workspace_id
              - repo_url
              - default_branch
              - install_url
              - request_id
              properties:
                workspace_id:
                  type: string
                  format: uuid
                  description: Unique workspace identifier
                repo_url:
                  type: string
                  format: uri
                  description: Repository URL
                default_branch:
                  type: string
                  description: Default branch for the workspace
                install_url:
                  type: string
                  format: uri
                  description: GitHub App installation URL — direct user here if the app is not yet installed
                request_id:
                  type: string
                  format: uuid
                  description: Unique request identifier
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/pause:
  post:
    operationId: pause_workspace
    summary: Pause or unpause a workspace
    description: Toggles the paused state of a workspace. When paused, no new runs will be started and queued runs will be
      held. Uses optimistic concurrency via the version field.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - pause
            - reason
            - version
            properties:
              pause:
                type: boolean
                description: True to pause, false to unpause
              reason:
                type: string
                description: Human-readable reason for the state change
              version:
                type: integer
                description: Optimistic concurrency version — must match current workspace version
    responses:
      '200':
        description: Workspace pause state updated
        content:
          application/json:
            schema:
              type: object
              required:
              - workspace_id
              - paused
              - version
              - request_id
              properties:
                workspace_id:
                  type: string
                  format: uuid
                paused:
                  type: boolean
                version:
                  type: integer
                request_id:
                  type: string
                  format: uuid
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/events:
  get:
    operationId: list_workspace_events
    summary: List a workspace's aggregate event history
    description: >
      Cursor-paginated list of operator-visible events across every
      zombie in the workspace, newest first. Replaces the deleted
      activity endpoint. Optional `zombie_id` filter narrows to one
      zombie. Same query shape as the per-zombie endpoint - `actor`
      glob, `since=` (duration or RFC 3339), and a `cursor` mutually
      exclusive with `since`.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: query
      required: false
      description: Drill down to one zombie within the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: Opaque cursor from a prior response. Mutually exclusive with `since`.
      schema:
        type: string
    - name: actor
      in: query
      required: false
      description: Glob filter against actor.
      schema:
        type: string
    - name: since
      in: query
      required: false
      description: Lower bound on `created_at`. Go-style duration or RFC 3339 timestamp.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                items:
                  type: array
                  items:
                    type: object
                next_cursor:
                  type: string
                  nullable: true
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
