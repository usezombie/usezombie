/v1/api-keys:
  post:
    operationId: create_api_key
    summary: Mint a tenant API key
    description: Creates a new `zmb_t_`-prefixed tenant admin key. **The raw key is returned once.** Only the SHA-256 hash
      is persisted — the key cannot be retrieved again. Requires operator (or admin) role.
    tags:
    - API Keys
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - key_name
            properties:
              key_name:
                type: string
                minLength: 1
                maxLength: 64
                description: Unique per tenant. Alphanumeric, hyphens, and underscores only.
              description:
                type: string
                maxLength: 256
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - key_name
              - key
              - created_at
              properties:
                id:
                  type: string
                  format: uuid
                key_name:
                  type: string
                key:
                  type: string
                  description: Raw `zmb_t_` tenant key (70 chars). Shown once — store securely.
                created_at:
                  type: integer
                  format: int64
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        description: Key name already exists for this tenant (`UZ-APIKEY-005`).
        $ref: ../components/responses.yaml#/components/responses/Error
  get:
    operationId: list_api_keys
    summary: List tenant API keys
    description: Returns metadata for every tenant API key visible to the caller. Results are always scoped to the caller's
      tenant; `key_hash` is never returned.
    tags:
    - API Keys
    parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    - name: sort
      in: query
      required: false
      schema:
        type: string
        enum:
        - created_at
        - -created_at
        - key_name
        - -key_name
        default: -created_at
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              - page
              - page_size
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/TenantApiKey
                total:
                  type: integer
                  description: Total rows across all pages for this tenant.
                page:
                  type: integer
                page_size:
                  type: integer
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/api-keys/{id}:
  patch:
    operationId: revoke_api_key
    summary: Revoke a tenant API key
    description: 'Partial lifecycle update. Body must be `{"active": false}` — re-activation is not supported; mint a new
      key instead. Sets `revoked_at` and `updated_at`.'
    tags:
    - API Keys
    parameters:
    - name: id
      in: path
      required: true
      description: UUIDv7 of the API key.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - active
            properties:
              active:
                type: boolean
                enum:
                - false
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - active
              - revoked_at
              properties:
                id:
                  type: string
                  format: uuid
                active:
                  type: boolean
                  enum:
                  - false
                revoked_at:
                  type: integer
                  format: int64
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        description: 'Key is already revoked (`UZ-APIKEY-006`) or attempted to set `active: true` (`UZ-APIKEY-007`).'
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_api_key
    summary: Delete a revoked tenant API key
    description: Hard-deletes the row from `core.api_keys`. The key must already be revoked (`active = false`); an active
      key returns `409 UZ-APIKEY-008`.
    tags:
    - API Keys
    parameters:
    - name: id
      in: path
      required: true
      description: UUIDv7 of the API key.
      schema:
        type: string
        format: uuid
    responses:
      '204':
        description: No Content
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        description: Active key must be revoked before deletion (`UZ-APIKEY-008`).
        $ref: ../components/responses.yaml#/components/responses/Error
