/v1/webhooks/{zombie_id}:
  post:
    operationId: receive_webhook
    summary: Deliver an inbound webhook event to a Zombie
    description: 'Delivers an inbound event to the Zombie identified by `zombie_id`. The Zombie is looked up by primary
      key ã no JSONB traversal, no source-name uniqueness required. The body MUST be HMAC-SHA256 signed with the workspace
      credential keyed by the Zombie''s `trigger.source` (e.g. vault row `zombie:linear`, field `webhook_secret`). The
      provider-specific signature header (`x-hub-signature-256` for GitHub, `x-slack-signature` for Slack, etc.) is
      verified upstream by the `webhook_sig` middleware; this handler runs only after the HMAC is valid. There is no
      Bearer fallback ã every inbound webhook MUST be signed. Duplicate events (same `event_id` within 24 h) return 200
      `{status: "duplicate"}`. A new event is enqueued to the Zombie''s Redis stream and returns 202.'
    tags:
    - Zombies
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the target Zombie. Obtained from `POST /v1/workspaces/{workspace_id}/zombies` or `zombiectl install --from <path>`.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - event_id
            - type
            - data
            properties:
              event_id:
                type: string
                description: Unique identifier for this event. Used for idempotency deduplication (24-hour window).
              type:
                type: string
                description: Event type label (e.g. `email.received`, `push`, `payment.succeeded`).
              data:
                type: object
                additionalProperties: true
                description: Event payload ã any JSON object. Passed as-is into the Zombie event loop.
    responses:
      '202':
        description: Event accepted and enqueued for the Zombie.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  const: accepted
                event_id:
                  type: string
      '200':
        description: Duplicate event ã already processed within the 24-hour dedup window.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  const: duplicate
      '400':
        description: Malformed payload ã missing `event_id` or `type`.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '401':
        description: 'Webhook auth failure. Three distinct codes: `UZ-WH-020 webhook_credential_not_configured`
          (zombie has no recognized provider, OR the workspace has no matching `zombie:<source>` vault credential, OR
          the credential JSON has no `webhook_secret` field ã this is the operator-recoverable misconfig path);
          `UZ-WH-010 invalid_signature` (provider + secret are configured but the request is unsigned, mis-signed, or
          the body was tampered with); `UZ-WH-011 stale_timestamp` (Slack-style schemes with timestamp drift > 5 min).'
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '404':
        description: No active Zombie is configured for this source (UZ-WH-001).
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '409':
        description: Zombie exists but is paused or stopped (UZ-WH-003).
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/workspaces/{workspace_id}/zombies:
  get:
    operationId: list_zombies
    summary: List zombies in a workspace
    description: >
      Returns zombies the caller has access to in the given workspace. Keyset
      paginated over `(created_at DESC, id DESC)`. Omit `cursor` for the first
      page; pass the response `cursor` back verbatim to fetch the next page.
      `cursor` is `null` when the last page has been reached. Response envelope
      follows the RAD ôÏ8 `items`/`total` convention (`total` is the size of
      this page, not a global count).
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: >
        Opaque page cursor from a prior response's `cursor` field, formatted
        `{created_at_epoch_ms}:{zombie_id}`. Omit for the first page.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      description: Page size. Defaults to 20. Clamped to a maximum of 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              - cursor
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/ZombieSummary
                total:
                  type: integer
                  description: Count of items in this response (not total across pages).
                cursor:
                  type: string
                  nullable: true
                  description: >
                    Opaque cursor to fetch the next page. `null` when there are
                    no more pages.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: create_zombie
    summary: Create a zombie
    description: Creates a new zombie from a TRIGGER.md (deployment manifest) and a SKILL.md (agent instructions). The
      server is the single parser of TRIGGER.md frontmatter ã `name` and the persisted `config_json` are derived
      server-side. The CLI (`zombiectl install --from <path>`) sends the two markdown files as raw bytes; no YAML
      parsing happens client-side.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - trigger_markdown
            - source_markdown
            properties:
              trigger_markdown:
                type: string
                maxLength: 65536
                description: TRIGGER.md raw bytes ã YAML frontmatter (`name`, `trigger`, `tools`, `credentials`,
                  `network`, `budget`, `gates`) between `---` delimiters. Server parses this to derive `name`
                  and the persisted `config_json`.
              source_markdown:
                type: string
                maxLength: 65536
                description: SKILL.md raw bytes ã the agent instructions, stored as-is.
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              required:
              - zombie_id
              - name
              - status
              properties:
                zombie_id:
                  type: string
                  format: uuid
                name:
                  type: string
                  description: Zombie name parsed from TRIGGER.md frontmatter ã the canonical identifier the user
                    will see in `zombiectl status` and CLI output.
                status:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}:
  patch:
    operationId: patch_zombie
    summary: Update or kill a zombie
    description: 'Partial update of a zombie. Body fields are optional and presence-based: `config_json` (replace
      the zombie''s config ã publishes zombie_config_changed) and/or `status:"killed"` (cancel any in-flight executor
      session and mark the zombie killed ã publishes zombie_status_changed). Both fields can ride together; the SQL
      UPDATE is one statement and one control-stream publish fires per dirty surface. Returns the new config_revision
      (a strictly monotonic ms-epoch timestamp). Idempotent ã re-killing a killed zombie returns 404.'
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              config_json:
                type: string
                description: The new zombie config as a JSON string. Validated server-side.
              status:
                type: string
                enum:
                - killed
                description: 'Set to "killed" to cancel any in-flight session and mark the zombie killed.'
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum:
                  - killed
                  description: 'Present only when the request body included `status:"killed"`.'
                config_revision:
                  type: integer
                  format: int64
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/messages:
  post:
    operationId: post_zombie_message
    summary: Post a chat message to a zombie
    description: Build an EventEnvelope with `actor=steer:<user>` / `event_type=chat` and XADD it onto `zombie:{id}:events`.
      The Redis stream entry id IS the canonical event_id and is returned to the caller so SSE consumers can filter
      frames for the message they just sent. Same single-ingress contract as webhook and continuation events ã no separate
      "queued vs instant" mode.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - message
            properties:
              message:
                type: string
                description: Operator message body. Up to 8192 bytes. The server wraps it in a JSON object with a "message"
                  field as the envelope's request payload.
    responses:
      '202':
        description: Event enqueued. The CLI uses event_id to filter SSE frames.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  enum:
                  - accepted
                event_id:
                  type: string
                  description: Redis stream entry id (the canonical event_id). Format `<ms>-<seq>`.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/events:
  get:
    operationId: list_zombie_events
    summary: List a zombie's event history
    description: >
      Cursor-paginated list of operator-visible events for one zombie,
      newest first. Each row is a `core.zombie_events` entry ã the
      durable record produced by the worker write path on every steer,
      webhook, cron, or continuation event. Filter by actor glob
      (e.g. `steer:*`, `webhook:github`) or `since=` (Go-style
      duration like `2h`/`30m` or RFC 3339 timestamp). `since=` and
      `cursor=` are mutually exclusive.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: Opaque base64url-no-pad cursor returned in `next_cursor`. Mutually exclusive with `since`.
      schema:
        type: string
    - name: actor
      in: query
      required: false
      description: Glob filter against the row's actor. `*` is a wildcard. Examples - 'steer:kishore', 'webhook:github', 'webhook:*'.
      schema:
        type: string
    - name: since
      in: query
      required: false
      description: Lower bound on `created_at`. Accepts Go-style durations (15s/30m/2h/7d) or RFC 3339 timestamps. Mutually exclusive with `cursor`.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                items:
                  type: array
                  items:
                    type: object
                    description: One zombie_events row.
                next_cursor:
                  type: string
                  nullable: true
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/events/stream:
  get:
    operationId: stream_zombie_events
    summary: Subscribe to a zombie's live activity stream (SSE)
    description: >
      Server-Sent Events tail of the Redis pub/sub channel
      `zombie:{id}:activity`. The handler SUBSCRIBEs on a dedicated
      Redis connection and forwards each PUBLISH frame as one SSE
      event with id (per-connection monotonic counter), event (frame
      kind), and data (JSON payload) lines. Frame kinds - event_received,
      tool_call_started, tool_call_progress, chunk, tool_call_completed,
      event_complete. Sequence ids reset to 0 on every new SUBSCRIBE
      and the server ignores `Last-Event-ID`. Clients reconnect by
      calling GET /events with a cursor to backfill the durable record,
      then re-open this stream. Authentication this slice is Bearer-only
      (CLI / programmatic). Browser cookie auth lands with the dashboard
      slice.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: SSE stream opened.
        content:
          text/event-stream:
            schema:
              type: string
              description: SSE-formatted frames.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security:
    - BearerAuth: []
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/current-run:
  delete:
    operationId: delete_workspace_zombie_current_run
    summary: Kill the zombie's current running action
    description: Transitions the zombie's status from `active` or `paused` to `stopped` and records a `zombie_stopped`
      activity event. Modeled as a DELETE on a singleton sub-resource (the zombie's "current run") rather than the
      retired `POST .../stop` path-verb form ã see `docs/REST_API_DESIGN_GUIDELINES.md` ôÏ7. Returns 409 if the zombie
      is already stopped or killed. Returns 404 if the zombie is not in the path workspace (cross-workspace IDOR guard).
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Zombie transitioned to stopped
        content:
          application/json:
            schema:
              type: object
              required:
              - zombie_id
              - workspace_id
              - status
              - request_id
              properties:
                zombie_id:
                  type: string
                workspace_id:
                  type: string
                status:
                  type: string
                  enum:
                  - stopped
                request_id:
                  type: string
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
