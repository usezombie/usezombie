/v1/webhooks/{zombie_id}:
  post:
    operationId: receive_webhook
    summary: Deliver an inbound webhook event to a Zombie
    description: 'Delivers an inbound event to the Zombie identified by `zombie_id`. The Zombie is looked up by primary key
      — no JSONB traversal, no source-name uniqueness required. Bearer token is validated against the Zombie''s `trigger.token`
      (omit if no token configured). Duplicate events (same `event_id` within 24 h) return 200 `{status: "duplicate"}`. A
      new event is enqueued to the Zombie''s Redis stream and returns 202.'
    tags:
    - Zombies
    parameters:
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the target Zombie. Obtained from `POST /v1/workspaces/{workspace_id}/zombies` or `zombiectl install --from <path>`.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - event_id
            - type
            - data
            properties:
              event_id:
                type: string
                description: Unique identifier for this event. Used for idempotency deduplication (24-hour window).
              type:
                type: string
                description: Event type label (e.g. `email.received`, `push`, `payment.succeeded`).
              data:
                type: object
                additionalProperties: true
                description: Event payload — any JSON object. Passed as-is into the Zombie event loop.
    responses:
      '202':
        description: Event accepted and enqueued for the Zombie.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  const: accepted
                event_id:
                  type: string
      '200':
        description: Duplicate event — already processed within the 24-hour dedup window.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  const: duplicate
      '400':
        description: Malformed payload — missing `event_id` or `type`.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '401':
        description: Missing or invalid Bearer token.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '404':
        description: No active Zombie is configured for this source (UZ-WH-001).
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '409':
        description: Zombie exists but is paused or stopped (UZ-WH-003).
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security:
    - BearerAuth: []
/v1/workspaces/{workspace_id}/zombies:
  get:
    operationId: list_zombies
    summary: List zombies in a workspace
    description: >
      Returns zombies the caller has access to in the given workspace. Keyset
      paginated over `(created_at DESC, id DESC)`. Omit `cursor` for the first
      page; pass the response `cursor` back verbatim to fetch the next page.
      `cursor` is `null` when the last page has been reached. Response envelope
      follows the RAD §8 `items`/`total` convention (`total` is the size of
      this page, not a global count).
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: >
        Opaque page cursor from a prior response's `cursor` field, formatted
        `{created_at_epoch_ms}:{zombie_id}`. Omit for the first page.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      description: Page size. Defaults to 20. Clamped to a maximum of 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              - cursor
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/ZombieSummary
                total:
                  type: integer
                  description: Count of items in this response (not total across pages).
                cursor:
                  type: string
                  nullable: true
                  description: >
                    Opaque cursor to fetch the next page. `null` when there are
                    no more pages.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: create_zombie
    summary: Create a zombie
    description: Creates a new zombie from a TRIGGER.md (deployment manifest) and a SKILL.md (agent instructions). The
      server is the single parser of TRIGGER.md frontmatter — `name` and the persisted `config_json` are derived
      server-side. The CLI (`zombiectl install --from <path>`) sends the two markdown files as raw bytes; no YAML
      parsing happens client-side.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - trigger_markdown
            - source_markdown
            properties:
              trigger_markdown:
                type: string
                maxLength: 65536
                description: TRIGGER.md raw bytes — YAML frontmatter (`name`, `trigger`, `tools`, `credentials`,
                  `network`, `budget`, `gates`) between `---` delimiters. Server parses this to derive `name`
                  and the persisted `config_json`.
              source_markdown:
                type: string
                maxLength: 65536
                description: SKILL.md raw bytes — the agent instructions, stored as-is.
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              required:
              - zombie_id
              - name
              - status
              properties:
                zombie_id:
                  type: string
                  format: uuid
                name:
                  type: string
                  description: Zombie name parsed from TRIGGER.md frontmatter — the canonical identifier the user
                    will see in `zombiectl status` and CLI output.
                status:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}:
  patch:
    operationId: patch_zombie
    summary: Update a zombie's config
    description: 'Partial update of zombie config_json. Publishes a zombie_config_changed control-stream signal so
      the worker observes the new revision on its next loop iteration. Returns the new config_revision (a strictly
      monotonic ms-epoch timestamp).'
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              config_json:
                type: string
                description: The new zombie config as a JSON string. Validated server-side.
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                  format: uuid
                config_revision:
                  type: integer
                  format: int64
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/kill:
  post:
    operationId: kill_zombie
    summary: Kill a zombie
    description: 'Marks the zombie as killed and publishes a zombie_status_changed control-stream signal. The watcher
      flips the per-zombie cancel flag and (if mid-execution) calls the executor''s cancelExecution. The per-zombie
      thread observes the cancel at the top of its next loop iteration and exits within ~100ms. Idempotent — re-killing
      a killed zombie returns 404 (no row to update). Scoped to workspace; cross-workspace kills are rejected at the
      SQL layer.'
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum:
                  - killed
                queued_at:
                  type: integer
                  format: int64
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/steer:
  post:
    operationId: steer_zombie
    summary: Steer a running zombie
    description: Send a message to a running zombie to nudge it at the next gate checkpoint. Queued (next checkpoint) or instant
      (IPC delivery) per body.
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - message
            properties:
              message:
                type: string
              mode:
                type: string
                enum:
                - queued
                - instant
                default: queued
    responses:
      '202':
        description: Accepted
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                event_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/current-run:
  delete:
    operationId: delete_workspace_zombie_current_run
    summary: Kill the zombie's current running action
    description: Transitions the zombie's status from `active` or `paused` to `stopped` and records a `zombie_stopped`
      activity event. Modeled as a DELETE on a singleton sub-resource (the zombie's "current run") rather than the
      retired `POST .../stop` path-verb form — see `docs/REST_API_DESIGN_GUIDELINES.md` §7. Returns 409 if the zombie
      is already stopped or killed. Returns 404 if the zombie is not in the path workspace (cross-workspace IDOR guard).
    tags:
    - Zombies
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Zombie transitioned to stopped
        content:
          application/json:
            schema:
              type: object
              required:
              - zombie_id
              - workspace_id
              - status
              - request_id
              properties:
                zombie_id:
                  type: string
                workspace_id:
                  type: string
                status:
                  type: string
                  enum:
                  - stopped
                request_id:
                  type: string
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
