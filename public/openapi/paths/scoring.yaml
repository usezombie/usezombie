/v1/workspaces/{workspace_id}/scoring/config:
  post:
    operationId: set_workspace_scoring_config
    summary: Set per-workspace scoring configuration
    description: Persists the scoring thresholds and weights for run evaluation in this workspace.
    tags:
    - Scoring
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - scoring_context_max_tokens
            properties:
              scoring_context_max_tokens:
                type: integer
                format: int32
                minimum: 1
                description: Maximum token budget for the scoring prompt context.
    responses:
      '200':
        description: Scoring config applied.
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  format: uuid
                scoring_context_max_tokens:
                  type: integer
                  format: int32
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
