/v1/workspaces/{workspace_id}/zombies/{zombie_id}/stop:
  post:
    operationId: stop_workspace_zombie
    summary: Stop a zombie (kill switch)
    description: Transitions a zombie's status from `active` or `paused` to `stopped` and records a `zombie_stopped` activity
      event. Returns 409 if the zombie is already stopped or killed. Returns 404 if the zombie is not in the path workspace
      (cross-workspace IDOR guard).
    tags:
    - Zombie
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Zombie transitioned to stopped
        content:
          application/json:
            schema:
              type: object
              required:
              - zombie_id
              - workspace_id
              - status
              - request_id
              properties:
                zombie_id:
                  type: string
                workspace_id:
                  type: string
                status:
                  type: string
                  enum:
                  - stopped
                request_id:
                  type: string
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
