/v1/tenants/me/workspaces:
  get:
    operationId: list_tenant_workspaces
    summary: List every workspace the caller's tenant owns
    description: >
      Returns the full set of workspaces owned by the caller's tenant. Backs
      the dashboard workspace switcher: a user can switch to any workspace in
      this list without re-issuing the JWT, because workspace authorisation is
      tenant-scoped. No pagination — a tenant's workspace count is bounded and
      small in practice.
    tags:
    - Workspaces
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required:
                    - id
                    - name
                    - created_at
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: UUIDv7 of the workspace.
                      name:
                        type: string
                        nullable: true
                        description: Human-readable workspace name. Nullable — pre-rename workspaces may not have one.
                      created_at:
                        type: integer
                        format: int64
                        description: Workspace creation time (epoch ms).
                total:
                  type: integer
                  description: Count of items returned.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
