/v1/memory/forget:
  post:
    operationId: memory_forget
    summary: Forget a memory entry by key
    description: 'Deletes the entry with the given `key` under the zombie instance. Returns `{ deleted: false }` if no match
      — never errors on miss.'
    tags:
    - Memory
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - zombie_id
            - key
            properties:
              zombie_id:
                type: string
                format: uuid
              key:
                type: string
                maxLength: 255
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                key:
                  type: string
                deleted:
                  type: boolean
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/memory/list:
  get:
    operationId: memory_list
    summary: List recent memory entries
    description: Returns most-recent entries, optionally filtered by category.
    tags:
    - Memory
    parameters:
    - name: zombie_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    - name: category
      in: query
      required: false
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 100
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/MemoryEntry
                total:
                  type: integer
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/memory/recall:
  get:
    operationId: memory_recall
    summary: Recall memory entries matching a query
    description: Case-insensitive LIKE search across both `key` and `content`. LIKE metacharacters in `query` are escaped
      — a query of `%` does NOT return every entry.
    tags:
    - Memory
    parameters:
    - name: zombie_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    - name: query
      in: query
      required: true
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/MemoryEntry
                total:
                  type: integer
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/memory/store:
  post:
    operationId: memory_store
    summary: Store or upsert a memory entry
    description: Writes a `(key, content, category)` entry scoped to a zombie instance. Idempotent upsert on `(key, instance_id)`.
    tags:
    - Memory
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - zombie_id
            - key
            - content
            properties:
              zombie_id:
                type: string
                format: uuid
              key:
                type: string
                maxLength: 255
              content:
                type: string
                maxLength: 16384
              category:
                type: string
                default: core
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                zombie_id:
                  type: string
                key:
                  type: string
                category:
                  type: string
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
