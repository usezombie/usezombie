/v1/workspaces/{workspace_id}/zombies/{zombie_id}/memories:
  get:
    operationId: list_zombie_memories
    summary: List or search memory entries for a zombie
    description: >
      Returns memory entries for the zombie. Without `query` this lists most-recent
      entries (optionally filtered by `category`). With `query`, performs case-insensitive
      LIKE search across both `key` and `content` (LIKE metacharacters in `query` are
      escaped — a query of `%` does NOT return every entry).
    tags:
    - Memory
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: query
      in: query
      required: false
      description: Fuzzy text search across key and content. When omitted, the endpoint lists most-recent entries.
      schema:
        type: string
    - name: category
      in: query
      required: false
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 100
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/MemoryEntry
                total:
                  type: integer
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: store_zombie_memory
    summary: Store or upsert a memory entry
    description: Writes a `(key, content, category)` entry scoped to the zombie. Idempotent upsert on `(key, instance_id)`.
    tags:
    - Memory
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - key
            - content
            properties:
              key:
                type: string
                maxLength: 255
              content:
                type: string
                maxLength: 16384
              category:
                type: string
                default: core
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                category:
                  type: string
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/memories/{memory_key}:
  delete:
    operationId: delete_zombie_memory
    summary: Forget a memory entry by key
    description: Removes the entry at `(zombie_id, memory_key)` if present. Strictly idempotent — returns 204 whether the key existed or not.
    tags:
    - Memory
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: memory_key
      in: path
      required: true
      schema:
        type: string
        maxLength: 255
    responses:
      '204':
        description: No Content (idempotent — returned whether the key existed or not)
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
