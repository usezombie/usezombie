/v1/workspaces/{workspace_id}/agent-keys:
  get:
    operationId: list_agent_keys
    summary: List agent keys in a workspace
    description: Returns agent-key metadata only — never returns `key_hash`.
    tags:
    - Agent Keys
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/AgentKey
                total:
                  type: integer
                  description: Count of items in this response (not total across pages).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: create_agent_key
    summary: Issue an agent key for a zombie
    description: Creates a new `zmb_` agent key bound to a specific zombie. **The raw key is returned once.** Only the SHA-256
      hash is persisted — the key cannot be retrieved again.
    tags:
    - Agent Keys
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - zombie_id
            - name
            properties:
              zombie_id:
                type: string
                format: uuid
              name:
                type: string
                maxLength: 64
              description:
                type: string
                maxLength: 256
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              required:
              - agent_id
              - key
              properties:
                agent_id:
                  type: string
                workspace_id:
                  type: string
                  format: uuid
                zombie_id:
                  type: string
                  format: uuid
                name:
                  type: string
                key:
                  type: string
                  description: Raw `zmb_` API key. Shown once — store securely.
                created_at:
                  type: integer
                  format: int64
                message:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/agent-keys/{agent_id}:
  delete:
    operationId: delete_agent_key
    summary: Revoke an agent key
    description: Revokes the agent key immediately. Subsequent requests with the key receive 401.
    tags:
    - Agent Keys
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: agent_id
      in: path
      required: true
      schema:
        type: string
    responses:
      '204':
        description: No Content
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
