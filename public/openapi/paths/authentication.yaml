/v1/auth/sessions:
  post:
    operationId: create_auth_session
    summary: Start a CLI login session
    description: |
      Step 1 of the CLI device flow. The CLI generates an ephemeral
      P-256 ECDH keypair and POSTs the public key plus an operator-facing
      `token_name` label. The server allocates a UUIDv7 session_id and
      stores `{cli_public_key, token_name, status: pending, expires_at_ms}`
      in Redis with a 5-minute TTL. The CLI then prints
      `https://app.usezombie.com/cli-auth/{session_id}` for the operator
      to open in their browser.

      Unauthenticated; rate-limited at the Cloudflare WAF edge
      (L2 — 10 / IP / minute on `POST /v1/auth/sessions`) and
      Clerk-edge (L1) for sign-in / sign-up traffic upstream.
    tags:
    - Authentication
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - public_key
            - token_name
            properties:
              public_key:
                type: string
                description: |
                  Base64url-encoded P-256 SubjectPublicKeyInfo. The CLI's
                  ephemeral ECDH public key — used by the dashboard to
                  derive the AES-256-GCM session key that wraps the JWT.
              token_name:
                type: string
                minLength: 1
                maxLength: 64
                description: |
                  Operator-facing label for the resulting credential
                  (e.g. `macos-cli`, `linux-cli`, `windows-cli`).
                  Printable ASCII; appears in audit events and
                  `zombiectl auth status`.
    responses:
      '201':
        description: Auth session created
        content:
          application/json:
            schema:
              type: object
              required:
              - session_id
              - request_id
              properties:
                session_id:
                  type: string
                  format: uuid
                  description: Session identifier for polling. UUIDv7.
                request_id:
                  type: string
                  format: uuid
                  description: Unique request identifier
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

/v1/auth/sessions/{session_id}:
  get:
    operationId: poll_auth_session
    summary: Poll auth session status
    description: |
      Step 2 of the CLI device flow. The CLI polls this endpoint with the
      `session_id` returned from `POST /v1/auth/sessions`. The response
      surfaces only the public material the CLI needs to proceed:
      `status`, `cli_public_key`, `token_name`, `expires_at_ms`.

      **NEVER** returns `ciphertext`, `nonce`, `dashboard_public_key`,
      `verification_code`, or `verification_code_hmac` (Invariant 1 in
      `docs/AUTH.md` Flow 1). Ciphertext release is gated behind the
      verification code on `POST /v1/auth/sessions/{id}/verify`.

      Unauthenticated by design — the CLI poll precedes any token grant.
      The terminal states (`expired`, `consumed`, `aborted`) return 410
      with a structured ErrorBody (`UZ-AUTH-006/012/013`).
    tags:
    - Authentication
    security: []
    parameters:
    - name: session_id
      in: path
      required: true
      description: Auth session identifier (UUIDv7)
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Session is in an active (non-terminal) state
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - cli_public_key
              - token_name
              - expires_at_ms
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - verification_pending
                  description: |
                    `pending` — created, awaiting dashboard approval.
                    `verification_pending` — dashboard approved, awaiting CLI
                    verification code.
                cli_public_key:
                  type: string
                  description: Echo of the CLI's ECDH public key (base64url P-256 SPKI).
                token_name:
                  type: string
                  description: Operator label that the dashboard shows to the user during approval.
                expires_at_ms:
                  type: integer
                  format: int64
                  description: Unix epoch milliseconds. Session TTL is 5 minutes from creation.
      '401':
        description: Session expired (`UZ-AUTH-006`) — the 5-minute TTL elapsed before this poll.
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '410':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_auth_session
    summary: Explicit cancel of a single login session
    description: |
      Used by the dashboard's "cancel this login" button and by the future
      sessions surface. Transitions the named session to `aborted` with
      `reason="explicit_cancel"`. The Clerk JWT MUST match the session's
      `clerk_user_id` (set on `PATCH /v1/auth/sessions/{id}/approve`);
      otherwise 403.
    tags:
    - Authentication
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '204':
        description: Session aborted
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

/v1/auth/sessions/all:
  delete:
    operationId: delete_all_auth_sessions
    summary: Bulk-abort every in-flight login session for the caller
    description: |
      Caller-scoped bulk delete. Enumerates every session with the caller's
      `clerk_user_id` whose status is `pending` or `verification_pending`
      and transitions each to `aborted` with `reason="explicit_cancel"`.

      Does NOT revoke already-minted JWTs — Clerk revocation is a separate
      problem; an active CLI continues to work until its short-lived JWT
      expires. This endpoint clears in-flight login sessions only.
    tags:
    - Authentication
    responses:
      '200':
        description: Sessions aborted (count includes 0 when none were pending)
        content:
          application/json:
            schema:
              type: object
              required:
              - aborted_count
              properties:
                aborted_count:
                  type: integer
                  minimum: 0
                  description: Number of in-flight sessions transitioned to aborted
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
