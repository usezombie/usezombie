/internal/v1/telemetry:
  get:
    operationId: internal_telemetry
    summary: Internal operator telemetry
    description: Admin-only platform health snapshot — in-flight request counts, queue depth, error rates. Requires the admin
      API key, not a user bearer token.
    tags:
    - Telemetry
    responses:
      '200':
        description: Operator telemetry snapshot.
        content:
          application/json:
            schema:
              type: object
              properties:
                api_in_flight_requests:
                  type: integer
                api_max_in_flight_requests:
                  type: integer
                queue_depth:
                  type: integer
                  nullable: true
                queue_age_ms:
                  type: integer
                  nullable: true
              additionalProperties: true
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/zombies/{zombie_id}/telemetry:
  get:
    operationId: get_zombie_telemetry
    summary: Get per-zombie telemetry
    description: Returns execution telemetry for a specific zombie — last activity, event count, budget consumed, error counts.
    tags:
    - Telemetry
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: zombie_id
      in: path
      required: true
      description: UUIDv7 of the zombie.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              description: Telemetry payload (shape evolves with operator needs).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
