/v1/workspaces/{workspace_id}/credentials:
  get:
    operationId: list_workspace_credentials
    summary: List credentials stored for a workspace
    description: Returns credential names. Values are never returned — they live encrypted in `vault.secrets`.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                credentials:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/CredentialSummary
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: store_workspace_credential
    summary: Store a credential in the workspace vault
    description: |
      Plaintext is the canonical-stringified form of the supplied JSON object,
      envelope-encrypted with the KEK (master key v1) and persisted to
      `vault.secrets`. The raw value is never stored unencrypted and never
      returned. `data` must be a non-empty JSON object whose stringified form
      is ≤ 4 KiB; bare strings, arrays, scalars, and `{}` are rejected with
      `UZ-VAULT-001`.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - data
            properties:
              name:
                type: string
                maxLength: 64
                description: Credential identifier referenced from a zombie's `credentials:` list.
              data:
                type: object
                minProperties: 1
                additionalProperties: true
                description: |
                  JSON object whose top-level keys are the field names a skill
                  references via `${secrets.<name>.<field>}`. The runtime never
                  inspects the schema — this is opaque to the platform.
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/credentials/{credential_name}:
  delete:
    operationId: delete_workspace_credential
    summary: Delete a credential from the workspace vault
    description: |
      Idempotent — returns 204 whether or not the credential existed.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: credential_name
      in: path
      required: true
      description: Credential name.
      schema:
        type: string
        maxLength: 64
    responses:
      '204':
        description: Credential deleted (or already absent)
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
