/v1/workspaces/{workspace_id}/credentials:
  get:
    operationId: list_workspace_credentials
    summary: List credentials stored for a workspace
    description: Returns credential names. Values are never returned — they live encrypted in `vault.secrets`.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                credentials:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/CredentialSummary
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: store_workspace_credential
    summary: Store a credential in the workspace vault
    description: Envelope-encrypted with the KEK (master key v1) and persisted to `vault.secrets`. The raw value is never
      stored unencrypted and never returned.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - value
            properties:
              name:
                type: string
                maxLength: 64
              value:
                type: string
                maxLength: 4096
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/credentials/llm:
  put:
    operationId: put_llm_credential
    summary: Set LLM credential
    description: Stores or replaces the BYOK LLM API key for a workspace. The key is encrypted at rest and never returned
      in API responses.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - provider
            - api_key
            properties:
              provider:
                type: string
                description: LLM provider name (e.g. openai, anthropic)
              api_key:
                type: string
                description: API key for the provider — encrypted at rest, never echoed
    responses:
      '204':
        description: Credential stored
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  get:
    operationId: get_llm_credential
    summary: Get LLM credential status
    description: Returns whether a BYOK LLM key is configured for the workspace and which provider it belongs to. Never returns
      the actual key.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Credential status
        content:
          application/json:
            schema:
              type: object
              required:
              - provider
              - has_key
              - request_id
              properties:
                provider:
                  type: string
                  description: Configured LLM provider name
                has_key:
                  type: boolean
                  description: True if an API key is stored
                request_id:
                  type: string
                  format: uuid
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_llm_credential
    summary: Delete LLM credential
    description: Removes the stored BYOK LLM API key for the workspace. Future runs will fall back to platform-provided keys
      if available.
    tags:
    - Credentials
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier
      schema:
        type: string
        format: uuid
    responses:
      '204':
        description: Credential deleted
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
