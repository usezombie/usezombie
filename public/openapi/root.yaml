openapi: 3.1.0
info:
  title: UseZombie Control Plane API
  version: 1.0.0
  description: Zombie automation control plane — webhook-driven agent execution in a bwrap+landlock sandbox.
  contact:
    name: UseZombie
    url: https://usezombie.com
servers:
- url: https://api.usezombie.com
  description: Production
security:
- BearerAuth: []
tags:
- name: Health
  description: System status and readiness probes
  x-mintlify:
    navigation: Health
- name: Authentication
  description: CLI login flow via device-code style sessions and GitHub OAuth
  x-mintlify:
    navigation: Authentication
- name: Workspaces
  description: Create and manage workspaces (one workspace per repo)
  x-mintlify:
    navigation: Workspaces
- name: Activity
  description: Workspace-wide activity feed (scheduled spec queues, zombie state transitions, webhook ingestion)
  x-mintlify:
    navigation: Activity
- name: Runs
  description: Core spec-to-PR pipeline — queue, monitor, stream, retry, and cancel runs
  x-mintlify:
    navigation: Runs
- name: Zombies
  description: Zombie management and webhook ingestion — create, configure, and operate event-driven Zombies
  x-mintlify:
    navigation: Zombies
- name: Memory
  description: Persistent zombie memory — store, recall, list, and forget key-value entries scoped to a zombie
  x-mintlify:
    navigation: Memory
- name: Credentials
  description: BYOK (Bring Your Own Key) LLM provider credentials
  x-mintlify:
    navigation: Credentials
- name: Admin
  description: Platform-wide configuration — manage shared LLM provider keys
  x-mintlify:
    navigation: Admin
- name: Billing
  description: Plan upgrades and billing events
  x-mintlify:
    navigation: Billing
- name: Integration Grants
  description: Zombie runtime permission grants for third-party services (Slack, GitHub, etc.)
  x-mintlify:
    navigation: Integration Grants
- name: Agent Keys
  description: Per-zombie API keys for LangGraph/CrewAI/Composio agents to call the Execute endpoint. Workspace-scoped.
  x-mintlify:
    navigation: Agent Keys
- name: API Keys
  description: Tenant-level admin API keys (`zmb_t_` prefix). Rotatable, self-service, replace the legacy `API_KEY` env var
    for admin auth.
  x-mintlify:
    navigation: API Keys
- name: Execute
  description: Synchronous tool execution proxy for external agents
  x-mintlify:
    navigation: Execute
- name: Slack
  description: Slack OAuth install flow and inbound events/interactions webhooks
  x-mintlify:
    navigation: Slack
- name: Webhooks
  description: Approval-gate webhooks invoked by humans to unblock a paused zombie
  x-mintlify:
    navigation: Webhooks
- name: Telemetry
  description: Per-zombie execution telemetry and internal operator telemetry
  x-mintlify:
    navigation: Telemetry
- name: Spec
  description: Spec templating and preview endpoints for the agent relay
  x-mintlify:
    navigation: Spec
paths:
  /healthz:
    $ref: ./paths/health.yaml#/~1healthz
  /internal/v1/telemetry:
    $ref: ./paths/telemetry.yaml#/~1internal~1v1~1telemetry
  /metrics:
    $ref: ./paths/health.yaml#/~1metrics
  /readyz:
    $ref: ./paths/health.yaml#/~1readyz
  /v1/admin/platform-keys:
    $ref: ./paths/admin.yaml#/~1v1~1admin~1platform-keys
  /v1/admin/platform-keys/{provider}:
    $ref: ./paths/admin.yaml#/~1v1~1admin~1platform-keys~1{provider}
  /v1/auth/sessions:
    $ref: ./paths/authentication.yaml#/~1v1~1auth~1sessions
  /v1/auth/sessions/{session_id}:
    $ref: ./paths/authentication.yaml#/~1v1~1auth~1sessions~1{session_id}
  /v1/auth/sessions/{session_id}/complete:
    $ref: ./paths/authentication.yaml#/~1v1~1auth~1sessions~1{session_id}~1complete
  /v1/execute:
