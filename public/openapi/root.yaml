  /v1/memory/recall:
    $ref: ./paths/memory.yaml#/~1v1~1memory~1recall
  /v1/memory/store:
    $ref: ./paths/memory.yaml#/~1v1~1memory~1store
  /v1/slack/callback:
    $ref: ./paths/slack.yaml#/~1v1~1slack~1callback
  /v1/slack/events:
    $ref: ./paths/slack.yaml#/~1v1~1slack~1events
  /v1/slack/install:
