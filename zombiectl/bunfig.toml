# Coverage knobs for `bun test --coverage`. Floor matches the
# 95% bar shared with `ui/packages/{app,website}` — every product
# in the monorepo answers to the same gate.
#
# The acceptance suite (`test/acceptance/**`) is intentionally
# OUT of `bun test`'s glob: those specs use `node:test` (not
# `bun:test`) because they spawn long-lived child processes
# (Playwright Chromium, polling CLI subprocesses) that the Bun
# test runner does not bound cleanly. They run via
# `bun run test:acceptance` (→ `node --test` via
# `scripts/run-acceptance.mjs`).
[test]
coverage = true
coverageThreshold = { line = 0.95, function = 0.95 }
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = ["test/acceptance/**"]
