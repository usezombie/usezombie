# Coverage knobs for `bun test --coverage`. Floor pinned per Captain
# ack: line ≥97%, function ≥96%. The previous 99/99 floor
# was relaxed when the Effect-TS migration introduced Context.Tag-only
# .service.ts shapes whose constructors bun cannot exercise, plus
# pre-existing zombie/* command surface that was deferred to a
# follow-up coverage spec. coveragePathIgnorePatterns carves out those
# files; the global floor enforces the rest. Any deviation requires
# explicit Captain approval and is documented in PR session notes.
# Enforced by scripts/enforce-coverage.mjs (bun 1.3.x parses but does
# not enforce the bunfig threshold itself).
#
# Known gotcha: bun's per-function coverage counts synthesized fns it
# cannot easily exercise — Context.Tag class constructors (Layer.succeed
# registers the shape, never `new`'s the class) and some
# Data.TaggedError `message` getters that don't surface in the FN table
# even when asserted. Tests must instantiate the tag classes and call
# `.message` on every variant explicitly to satisfy the 99% floor.
#
# The acceptance suite (`test/acceptance/*.spec.js`) runs under the
# same `bun:test` runtime as the rest of the suite — Captain
# consolidated the dual-runner split (was node:test for acceptance,
# bun:test elsewhere). The prior rationale was bound-cleanly concerns
# with long-lived child processes (Playwright Chromium, polling CLI
# subprocesses); if those resurface live, revisit. Acceptance specs
# self-gate on ZOMBIE_ACCEPTANCE_TARGET being an https URL — without
# the env they register skip-only placeholders. Default `bun test`
# globs match `*.test.{js,ts}` so `*.spec.js` files are picked up
# only by the explicit `bun test test/acceptance` invocation.
#
# Coverage scope: production code under src/ only. test/** is
# excluded because helpers, fixtures, and matrix tables are scaffolding,
# not subjects-under-test. coverageSkipTestFiles handles *.test.*
# automatically; the explicit ignore catches the non-test files under
# test/ that bun's heuristic doesn't.
[test]
# Preload forces telemetry-off so the suite is network-free (see
# test/setup.ts). Without it, in-process runCli tests hang on the
# PostHog flush and time out at 5s when the runner is offline.
preload = ["./test/setup.ts"]
coverage = true
coverageThreshold = { line = 0.97, function = 0.96 }
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "test/**",
  # Context.Tag-only shapes (Supabase split pattern: .service.ts
  # holds the tag, .layer.ts holds the implementation + tests).
  # See bunfig.toml header re: bun's per-function coverage of
  # Context.Tag classes.
  "src/services/browser.service.ts",
  "src/services/telemetry/analytics.service.ts",
  "src/services/telemetry/ai-tool.service.ts",
  "src/services/telemetry/runtime.service.ts",
]
