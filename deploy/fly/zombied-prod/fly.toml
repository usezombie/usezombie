app = "zombied-prod"
primary_region = "iad"

[build]
  image = "ghcr.io/usezombie/zombied:latest"

[processes]
  app = "/usr/local/bin/zombied serve"

# HTTP concurrency tuning. zombied runs httpz as an evented server:
#   API_HTTP_WORKERS — accept/event-loop threads (epoll/kqueue). Each worker
#                      multiplexes up to API_MAX_CLIENTS (1024) idle connections
#                      as file descriptors AND owns its OWN handler pool of
#                      API_HTTP_THREADS threads (the pool is PER worker --
#                      vendor/httpz/src/worker.zig). 2 workers across the 4
#                      cores for accept parallelism, leaving cores for the
#                      handler pool + background threads.
#   API_HTTP_THREADS — per-worker handler-pool size. The one long-lived handler
#                      that holds a thread for the whole connection is the SSE
#                      stream (events_stream.zig). The runner lease is a
#                      non-blocking single poll and does NOT hold a thread
#                      (docs/architecture/scaling.md).
# Total handler concurrency = WORKERS x THREADS = 2 x 32 = 64 per machine
# (~192 across 3 machines). Both knobs default to 1 (runtime_loader.zig),
# where one SSE stream saturates the pool. 64 mostly-I/O-parked handler threads
# sit easily in 4gb: the 16MiB stacks are virtual / lazily committed, plus
# ~64MiB of large buffers across 2 workers. Watch pool saturation on /metrics;
# the next lever is more replicas (the binding constraint per scaling.md).
[env]
  API_HTTP_THREADS = "32"
  API_HTTP_WORKERS = "2"

[[vm]]
  # 4 shared vCPUs / 4gb, matching the owner-confirmed prod slice. Fly applies
  # [[vm]] to every machine on `fly deploy`, so a mismatch would resize prod
  # in-place mid-rolling-deploy. Machine COUNT (2 -> 3) is set by flyctl scale /
  # the release pipeline, not here.
  # TODO(orly): remove this gate once a deploy confirms the live machines are
  #   already shared-cpu-4x / 4gb -- verify with `flyctl machine list -a zombied-prod`.
  size = "shared-cpu-4x"
  memory = "4gb"

[deploy]
  strategy = "rolling"
  release_command = "/usr/local/bin/zombied migrate"

# NO [http_service] block — no public Fly port, no *.fly.dev domain.
# All inbound traffic enters via Cloudflare Tunnel only (cloudflared-prod).
# Internal access: zombied-prod.internal:3000 over Fly 6PN.
# Machine count (2 -> 3 machines) and restart-policy (always) are enforced by
# the release pipeline after deploy — see deploy-prod-api job in release.yml.

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["app"]
