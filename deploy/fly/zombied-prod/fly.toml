app = "zombied-prod"
primary_region = "iad"

[build]
  image = "ghcr.io/usezombie/zombied:latest"

[processes]
  app = "/usr/local/bin/zombied serve"

# HTTP concurrency tuning. zombied runs httpz as an evented server:
#   API_HTTP_WORKERS — accept/event-loop threads (epoll/kqueue). Each worker
#                      multiplexes up to API_MAX_CLIENTS (1024) idle connections
#                      as file descriptors AND owns its OWN handler pool of
#                      API_HTTP_THREADS threads (the pool is PER worker --
#                      vendor/httpz/src/worker.zig). Kept at 1 so there is a
#                      single shared handler pool, not N fragmented ones.
#   API_HTTP_THREADS — handler-pool size. The one long-lived handler that holds
#                      a thread for the whole connection is the SSE stream
#                      (src/zombied/http/handlers/zombies/events_stream.zig).
#                      The runner lease is a non-blocking single poll and does
#                      NOT hold a thread (docs/architecture/scaling.md).
# Both default to 1 (src/zombied/config/runtime_loader.zig), so a single SSE
# stream saturates the pool and the next request queues. 32 lifts that ceiling
# 1 -> 32 on this 1gb box: the 16MiB thread stacks are virtual / lazily
# committed (a parked handler resides in tens of KB), and each SSE stream dials
# its own dedicated redis subscriber (bounded by redis maxclients, not this
# box). Raise after watching pool-saturation metrics; the next levers are a
# larger VM, then horizontal replicas (the binding constraint per scaling.md).
[env]
  API_HTTP_THREADS = "32"
  API_HTTP_WORKERS = "1"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[deploy]
  strategy = "rolling"
  release_command = "/usr/local/bin/zombied migrate"

# NO [http_service] block — no public Fly port, no *.fly.dev domain.
# All inbound traffic enters via Cloudflare Tunnel only (cloudflared-prod).
# Internal access: zombied-prod.internal:3000 over Fly 6PN.
# Machine count (1) and restart-policy (always) are enforced by the release
# pipeline after deploy — see deploy-prod-api job in release.yml.

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["app"]
