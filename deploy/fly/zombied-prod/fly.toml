app = "zombied-prod"
primary_region = "iad"

[build]
  image = "ghcr.io/usezombie/zombied:latest"

[processes]
  app = "/usr/local/bin/zombied serve"

# HTTP concurrency tuning. zombied runs httpz as an evented server:
#   API_HTTP_WORKERS — accept/event-loop threads (epoll/kqueue). Each worker
#                      multiplexes up to API_MAX_CLIENTS (1024) idle connections
#                      as file descriptors AND owns its OWN handler pool of
#                      API_HTTP_THREADS threads (the pool is PER worker --
#                      vendor/httpz/src/worker.zig). 2 workers on the prod
#                      multi-core slice for accept parallelism across cores.
#   API_HTTP_THREADS — per-worker handler-pool size. The one long-lived handler
#                      that holds a thread for the whole connection is the SSE
#                      stream (events_stream.zig). The runner lease is a
#                      non-blocking single poll and does NOT hold a thread
#                      (docs/architecture/scaling.md).
# Total handler concurrency = WORKERS x THREADS = 2 x 16 = 32 (the validated
# ceiling). Both knobs default to 1 (runtime_loader.zig), where one SSE stream
# saturates the pool. NOTE: the [[vm]] block below still reads
# shared-cpu-1x / 1gb -- if the live prod slice is larger, reconcile [[vm]]
# here too so a CI deploy does not scale prod back DOWN, then raise THREADS to
# 32 (-> 64 total) for more SSE headroom. Watch pool saturation on /metrics;
# next levers are a larger VM and horizontal replicas (binding constraint per
# scaling.md).
[env]
  API_HTTP_THREADS = "16"
  API_HTTP_WORKERS = "2"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[deploy]
  strategy = "rolling"
  release_command = "/usr/local/bin/zombied migrate"

# NO [http_service] block — no public Fly port, no *.fly.dev domain.
# All inbound traffic enters via Cloudflare Tunnel only (cloudflared-prod).
# Internal access: zombied-prod.internal:3000 over Fly 6PN.
# Machine count (1) and restart-policy (always) are enforced by the release
# pipeline after deploy — see deploy-prod-api job in release.yml.

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["app"]
