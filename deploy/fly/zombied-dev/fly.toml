app = "zombied-dev"
primary_region = "iad"

[build]
  image = "ghcr.io/usezombie/zombied:dev-latest"

[deploy]
  release_command = "/usr/local/bin/zombied migrate"

[processes]
  app = "/usr/local/bin/zombied serve"

# HTTP concurrency tuning — see deploy/fly/zombied-prod/fly.toml for the full
# rationale. API_HTTP_THREADS is the handler-pool ceiling; the default of 1
# means one long-lived handler (SSE stream / runner long-poll) saturates the
# pool. Pinned to 32 to MATCH prod's ceiling so dev surfaces any pool-
# saturation behaviour before prod does (the 512mb box still absorbs it —
# thread stacks are virtual/lazily committed, redis active count is
# unbounded). API_HTTP_WORKERS is the accept/event-loop thread count.
[env]
  API_HTTP_THREADS = "32"
  API_HTTP_WORKERS = "2"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# No public *.fly.dev domain — all inbound traffic enters via Cloudflare Tunnel
# (cloudflared-dev → zombied-dev.internal:3000 over Fly 6PN). Note: 6PN
# traffic bypasses the Fly proxy, so `auto_start_machines = true` does NOT
# wake stopped machines on inbound requests. CI explicitly pre-warms via
# `flyctl machine start` in the verify-dev job before polling /healthz.
# `min_machines_running = 1` keeps at least one machine alive in steady
# state, but enforcement is eventual; pre-warm is the deterministic gate.
[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[metrics]]
  port = 9091
  path = "/metrics"
  processes = ["app"]
