app = "zombied-dev"
primary_region = "iad"

[build]
  image = "ghcr.io/usezombie/zombied:dev-latest"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# No public *.fly.dev domain — all inbound traffic enters via Cloudflare Tunnel
# (cloudflared-dev → zombied-dev.internal:3000 over Fly 6PN).
# internal_port keeps the machine alive and lets Fly auto-start on 6PN traffic.
[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[metrics]
  port = 9091
  path = "/metrics"
