[extend]
useDefault = true

# Single merged allowlist — uses the universally-supported `[allowlist]`
# (singular) form. The `[[allowlists]]` array-of-tables form is only honored
# reliably by gitleaks >= 8.19, but CI pins gitleaks-action@v2.3.9 which
# bundles gitleaks v8.18.4. With the singular form everything is merged
# into one allowlist block that both old and new gitleaks respect.
[allowlist]
description = "Merged allowlist — build artifacts, deterministic test fixtures, and error-code false positives"
paths = [
  # Generated Next.js build artifacts
  '''(^|/)app/\.next/.*''',
  # Zig test files (deterministic fixtures, not real credentials)
  '''(^|/).*_test\.zig$''',
  # Zig build/cache directories
  '''(^|/)\.tmp/''',
  '''(^|/)zig-cache/''',
  '''(^|/)\.zig-cache/''',
  '''(^|/)zig-out/''',
  '''(^|/)\.tmp/zig-global-cache/''',
]
regexTarget = "match"
regexes = [
  # Test JWT tokens (RBAC integration test, kid=rbac-test-kid) — deterministic
  '''eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6InJiYWMtdGVzdC1raWQifQ\..*''',
  # UZ-* error codes in structured log messages (false positive: generic-api-key)
  '''UZ-[A-Z]+-\d{3}''',
  # Auth middleware test fixtures — deterministic signing secrets & nonces
  '''nonce1234567890abcdef''',
  '''8f742231b10e8888abcd99yyyzz0ek9i''',
]
stopwords = [
  "nonce1234567890abcdef",
  "8f742231b10e8888abcd99yyyzz0ek9i",
]
