[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated Next.js build artifacts"
paths = [
  '''(^|/)app/\.next/.*''',
]

[[allowlists]]
description = "Ignore deterministic JWT fixtures in jwks unit tests"
paths = [
  '''(^|/)src/auth/jwks_test\.zig$''',
]

[[allowlists]]
description = "Ignore UZ-* error codes in structured log messages (false positive: generic-api-key rule)"
regexTarget = "match"
regexes = [
  '''UZ-[A-Z]+-\d{3}''',
]

[[allowlists]]
description = "Ignore Zig cache and temp directories"
paths = [
  '''(^|/)\.tmp/''',
  '''(^|/)zig-cache/''',
  '''(^|/)\.zig-cache/''',
  '''(^|/)zig-out/''',
  '''(^|/)\.tmp/zig-global-cache/''',
]
