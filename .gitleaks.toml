[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated Next.js build artifacts"
paths = [
  '''(^|/)app/\.next/.*''',
]

[[allowlists]]
description = "Ignore deterministic JWT fixtures and test tokens in Zig test files"
paths = [
  '''(^|/).*_test\.zig$''',
]

[[allowlists]]
description = "Ignore test JWT tokens in RBAC integration test (deterministic, not real credentials)"
regexTarget = "match"
regexes = [
  '''eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6InJiYWMtdGVzdC1raWQifQ\..*''',
]

[[allowlists]]
description = "Ignore UZ-* error codes in structured log messages (false positive: generic-api-key rule)"
regexTarget = "match"
regexes = [
  '''UZ-[A-Z]+-\d{3}''',
]

[[allowlists]]
description = "Ignore Zig cache and temp directories"
paths = [
  '''(^|/)\.tmp/''',
  '''(^|/)zig-cache/''',
  '''(^|/)\.zig-cache/''',
  '''(^|/)zig-out/''',
  '''(^|/)\.tmp/zig-global-cache/''',
]

[[allowlists]]
description = "Auth middleware test fixtures — deterministic test signing secrets and high-entropy nonce strings used as test data (not real credentials). CI gitleaks version does not honor the path-based *_test.zig allowlist for git-history scans, so we pin explicit fingerprints."
stopwords = [
  "nonce1234567890abcdef",
]
regexTarget = "match"
regexes = [
  # Test nonce used in oauth_state_test.zig (all occurrences)
  '''nonce1234567890abcdef''',
  # Test Slack signing secret shape used in slack_signature_test.zig line 68
  '''8f742231b10e8888abcd99yyyzz0ek9i''',
]
