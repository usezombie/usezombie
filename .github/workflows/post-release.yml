name: Post-Release Verification

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  verify-npm:
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            name: macOS (arm64)
          - runner: ubuntu-latest
            name: Linux (x64)
          - runner: ubuntu-24.04-arm
            name: Linux (arm64)
          - runner: windows-latest
            name: Windows (x64)
    runs-on: ${{ matrix.runner }}
    name: npm — ${{ matrix.name }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Install @usezombie/zombiectl from npm
        run: npm install -g @usezombie/zombiectl@next

      - name: Verify --version matches published version
        run: |
          EXPECTED=$(npm view @usezombie/zombiectl@next version)
          VERSION=$(zombiectl --version 2>&1 | head -1)
          echo "zombiectl version: $VERSION"
          echo "expected (npm @next): $EXPECTED"
          echo "$VERSION" | grep -qF "$EXPECTED"
        shell: bash

      - name: Verify --help exits 0
        run: zombiectl --help
        shell: bash

      - name: Write per-platform summary row
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          echo "| ${{ matrix.name }} | npm | $ICON |" >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  # CLI acceptance against api.usezombie.com using the just-published
  # @usezombie/zombiectl@latest. WS-E #C2: secret-load comes AFTER `bun
  # install` AND `npm i -g` so a hostile postinstall sees no Clerk admin
  # key. lifecycle-after-login is skipped on PROD (no dashboard URL is
  # provided — per spec §5 disposition).
  cli-acceptance-prod:
    if: github.event.workflow_run.conclusion == 'success'
    needs: verify-npm
    runs-on: ubuntu-latest
    name: CLI acceptance — api.usezombie.com
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install zombiectl dev deps (BEFORE secret load — WS-E #C2)
        run: bun install --frozen-lockfile
        working-directory: zombiectl

      - name: Install zombiectl from npm @latest (BEFORE secret load — WS-E #C2)
        run: npm install -g @usezombie/zombiectl@latest

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: zombiectl

      - name: Load Clerk PROD credentials from 1Password (AFTER install)
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLERK_SECRET_KEY: op://${{ vars.VAULT_PROD }}/clerk-prod/secret-key
          AUTH_E2E_REGULAR_EMAIL: op://${{ vars.VAULT_PROD }}/e2e-fixtures-email/regular
          AUTH_E2E_ADMIN_EMAIL: op://${{ vars.VAULT_PROD }}/e2e-fixtures-email/admin

      - name: Run CLI acceptance against api.usezombie.com
        run: bun run test:acceptance
        working-directory: zombiectl
        env:
          ZOMBIE_ACCEPTANCE_TARGET: https://api.usezombie.com
          ZOMBIE_ACCEPTANCE_BINARY: global
          # ZOMBIE_ACCEPTANCE_DASHBOARD_URL intentionally unset — the
          # lifecycle-after-login spec skips on PROD per spec §5.
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          AUTH_E2E_REGULAR_EMAIL: ${{ env.AUTH_E2E_REGULAR_EMAIL }}
          AUTH_E2E_ADMIN_EMAIL: ${{ env.AUTH_E2E_ADMIN_EMAIL }}

      - name: Write CLI acceptance summary row
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          echo "| CLI acceptance (api.usezombie.com) | npm @latest | $ICON |" >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  summary:
    needs: [verify-npm, cli-acceptance-prod]
    if: always()
    runs-on: ubuntu-latest
    name: Post-Release Summary
    steps:
      - name: Generate summary header
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Post-Release Verification Results

          | Platform | Method | Status |
          |----------|--------|--------|

          > Per-platform results are written by each matrix runner above.
          EOF
