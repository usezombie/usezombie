name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-zombied:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/usezombie/ci-zig-ubuntu:0.15.2
    steps:
      - uses: actions/checkout@v6
      - name: Test zombied
        run: make test-zombied

  test-zombiectl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install zombiectl dependencies
        run: bun install --frozen-lockfile
        working-directory: zombiectl
      - name: Test zombiectl
        run: make test-unit-zombiectl

  test-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Test website
        run: bun run test:coverage
        working-directory: ui/packages/website
      - name: Upload website coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: website
          files: ui/packages/website/coverage/lcov.info
          fail_ci_if_error: false

  test-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Test app
        run: bun run test:coverage
        working-directory: ui/packages/app
      - name: Upload app coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: apps
          files: ui/packages/app/coverage/lcov.info
          fail_ci_if_error: false

  bundle-size-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Build website
        run: bun run build
        working-directory: ui/packages/website
      - name: Enforce bundle size budgets (§5.6.1)
        run: bun run size
        working-directory: ui/packages/website

  test:
    runs-on: ubuntu-latest
    needs: [test-zombied, test-zombiectl, test-website, test-app, bundle-size-website]
    steps:
      - name: Preserve legacy test check name
        run: echo "All test lanes passed"
