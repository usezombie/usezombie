name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit-agentsfleetd:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/usezombie/ci-zig-ubuntu:0.16.0
    steps:
      - uses: actions/checkout@v6
      - name: Test agentsfleetd (Zig units)
        run: make test-unit-agentsfleetd

  test-unit-zigrunner:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/usezombie/ci-zig-ubuntu:0.16.0
    steps:
      - uses: actions/checkout@v6
      - name: Test agentsfleet-runner (Zig units)
        run: make test-unit-zigrunner

  test-unit-ziglib:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/usezombie/ci-zig-ubuntu:0.16.0
    steps:
      - uses: actions/checkout@v6
      - name: Test shared src/lib (Zig units)
        run: make test-unit-ziglib

  test-unit-agentsfleet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install agentsfleet dependencies
        run: bun install --frozen-lockfile
        working-directory: agentsfleet
      - name: Test agentsfleet
        run: bun run test:coverage
        working-directory: agentsfleet
      - name: Upload agentsfleet coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: agentsfleet
          files: agentsfleet/coverage/lcov.info
          fail_ci_if_error: false

  test-unit-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Test website
        run: bun run test:coverage
        working-directory: ui/packages/website
      - name: Upload website coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: website
          files: ui/packages/website/coverage/lcov.info
          fail_ci_if_error: false

  test-unit-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Test app
        run: bun run test:coverage
        working-directory: ui/packages/app
      - name: Upload app coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: apps
          files: ui/packages/app/coverage/lcov.info
          fail_ci_if_error: false

  test-unit-design-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install design-system dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/design-system
      - name: Test design-system (97% coverage gate)
        run: bun run test:coverage
        working-directory: ui/packages/design-system
      - name: Upload design-system coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: design-system
          files: ui/packages/design-system/coverage/lcov.info
          fail_ci_if_error: false

  bundle-size-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Build website
        run: bun run build
        working-directory: ui/packages/website
      - name: Enforce bundle size budgets (§5.6.1)
        run: bun run size
        working-directory: ui/packages/website

  test:
    runs-on: ubuntu-latest
    needs: [test-unit-agentsfleetd, test-unit-zigrunner, test-unit-ziglib, test-unit-agentsfleet, test-unit-website, test-unit-app, test-unit-design-system, bundle-size-website]
    steps:
      - name: Preserve legacy test check name
        run: echo "All test lanes passed"
