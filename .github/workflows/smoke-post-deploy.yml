name: smoke (post-deploy)

# Vercel creates a GitHub deployment and marks it "success" after each deploy.
# This workflow fires once per Vercel project (website, agents-site, app).
# The deployment URL is used to route to the correct smoke suite.
on:
  deployment_status:

jobs:
  smoke:
    # Only run when Vercel marks the deployment as success
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      # Detect which Vercel project deployed based on URL pattern
      # Three projects: usezombie-app, usezombie-agents-sh, usezombie-website
      - name: Detect project
        id: detect
        run: |
          URL="${{ github.event.deployment_status.target_url }}"
          if echo "$URL" | grep -qi "usezombie-app\|app\.usezombie"; then
            echo "package=app" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/app" >> "$GITHUB_OUTPUT"
          elif echo "$URL" | grep -qi "usezombie-agents"; then
            echo "package=agents" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          else
            echo "package=website" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          fi

      - name: Load Vercel bypass secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VERCEL_BYPASS_SECRET_WEBSITE: op://ZMB_CD_PROD/vercel-bypass-website/credential
          VERCEL_BYPASS_SECRET_AGENTS: op://ZMB_CD_PROD/vercel-bypass-agents/credential
          VERCEL_BYPASS_SECRET_APP: op://ZMB_CD_PROD/vercel-bypass-app/credential

      - name: Select Vercel bypass secret
        run: |
          if [ "${{ steps.detect.outputs.package }}" = "app" ]; then
            echo "VERCEL_BYPASS_SECRET=$VERCEL_BYPASS_SECRET_APP" >> "$GITHUB_ENV"
          elif [ "${{ steps.detect.outputs.package }}" = "agents" ]; then
            echo "VERCEL_BYPASS_SECRET=$VERCEL_BYPASS_SECRET_AGENTS" >> "$GITHUB_ENV"
          else
            echo "VERCEL_BYPASS_SECRET=$VERCEL_BYPASS_SECRET_WEBSITE" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ steps.detect.outputs.workdir }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: ${{ steps.detect.outputs.workdir }}

      - name: Run smoke tests against deployed URL
        run: bun run test:e2e:smoke
        working-directory: ${{ steps.detect.outputs.workdir }}
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_BYPASS_SECRET: ${{ env.VERCEL_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-post-deploy-${{ steps.detect.outputs.package }}-${{ github.sha }}
          path: ${{ steps.detect.outputs.workdir }}/playwright-report/
          retention-days: 7
