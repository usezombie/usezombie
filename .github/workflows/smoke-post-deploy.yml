name: smoke (post-deploy)

# Vercel creates a GitHub deployment and marks it "success" after each deploy.
# This workflow fires once per Vercel project (website, agents-site, app).
# The deployment URL is used to route to the correct smoke suite.
on:
  deployment_status:

jobs:
  smoke:
    # Only run when Vercel marks the deployment as success
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: 1password/install-cli-action@v1

      # Detect which Vercel project deployed based on GitHub deployment metadata first.
      # URL-shape fallback remains for safety, but deployment.environment is the stable source.
      - name: Detect project
        id: detect
        run: |
          URL="${{ github.event.deployment_status.target_url }}"
          DEPLOY_ENV="${{ github.event.deployment.original_environment || github.event.deployment.environment }}"

          echo "deployment_environment=$DEPLOY_ENV"
          echo "target_url=$URL"

          if echo "$DEPLOY_ENV" | grep -qi "usezombie-app"; then
            echo "package=app" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/app" >> "$GITHUB_OUTPUT"
          elif echo "$DEPLOY_ENV" | grep -qi "usezombie-agents"; then
            echo "package=agents" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          elif echo "$DEPLOY_ENV" | grep -qi "usezombie-website"; then
            echo "package=website" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          elif echo "$URL" | grep -qi "usezombie-app\|app\.usezombie"; then
            echo "package=app" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/app" >> "$GITHUB_OUTPUT"
          elif echo "$URL" | grep -qi "usezombie-agents"; then
            echo "package=agents" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          else
            echo "package=website" >> "$GITHUB_OUTPUT"
            echo "workdir=ui/packages/website" >> "$GITHUB_OUTPUT"
          fi

      - name: Load selected Vercel bypass secret from 1Password (retry)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ "${{ steps.detect.outputs.package }}" = "app" ]; then
            SECRET_REF="op://${{ vars.VAULT_PROD }}/vercel-bypass-app/credential"
          elif [ "${{ steps.detect.outputs.package }}" = "agents" ]; then
            SECRET_REF="op://${{ vars.VAULT_PROD }}/vercel-bypass-agents/credential"
          else
            SECRET_REF="op://${{ vars.VAULT_PROD }}/vercel-bypass-website/credential"
          fi

          DELAY=1
          for ATTEMPT in $(seq 1 6); do
            if SECRET_VALUE="$(op read "$SECRET_REF" 2>/dev/null)"; then
              echo "VERCEL_BYPASS_SECRET=$SECRET_VALUE" >> "$GITHUB_ENV"
              exit 0
            fi
            if [ "$ATTEMPT" -lt 6 ]; then
              echo "attempt $ATTEMPT/6: failed to read bypass secret; retrying in ${DELAY}s..."
              sleep "$DELAY"
              DELAY=$((DELAY * 2))
            fi
          done

          echo "failed to read selected Vercel bypass secret from 1Password after retries"
          exit 1

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ steps.detect.outputs.workdir }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: ${{ steps.detect.outputs.workdir }}

      - name: Run smoke tests against deployed URL
        run: bun run test:e2e:smoke
        working-directory: ${{ steps.detect.outputs.workdir }}
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_BYPASS_SECRET: ${{ env.VERCEL_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-post-deploy-${{ steps.detect.outputs.package }}-${{ github.sha }}
          path: ${{ steps.detect.outputs.workdir }}/playwright-report/
          retention-days: 7
