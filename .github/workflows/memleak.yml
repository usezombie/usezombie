name: memleak

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memleak:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
      options: --security-opt seccomp=unconfined
    steps:
      - name: Install valgrind and toolchain deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            valgrind git curl xz-utils ca-certificates make gpg
          curl -L https://ziglang.org/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz \
            | tar xJ -C /usr/local
          echo "/usr/local/zig-linux-x86_64-0.15.2" >> "$GITHUB_PATH"
      - uses: actions/checkout@v6
      - name: Run memleak gate
        run: make memleak
