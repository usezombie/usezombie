name: memleak

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memleak:
    runs-on: ubuntu-latest
    container:
      # Pre-baked: trixie-slim + Zig + valgrind. Trixie's valgrind groks
      # Zig 0.15 DWARF; bookworm's misreads frames.
      image: ghcr.io/usezombie/ci-zig-debian-trixie:0.15.2
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@v6
      - name: Run memleak gate
        run: make memleak
