name: cross-compile

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux targets run inside debian:bookworm-slim so system libssl-dev matches
  # the production runtime (GLIBC 2.36).  Eliminates --no-allow-shlib-undefined
  # failures from Ubuntu runners shipping OpenSSL built against newer GLIBC.
  cross-compile-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
          - target: aarch64-linux
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    container:
      image: mirror.gcr.io/library/debian:bookworm-slim
    steps:
      - name: Install build dependencies
        run: apt-get update && apt-get install -y --no-install-recommends git libssl-dev ca-certificates xz-utils

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Compile zombied + zombied-executor (${{ matrix.target }})
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Verify binaries (${{ matrix.target }})
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor

  cross-compile-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Compile zombied + zombied-executor (aarch64-macos)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Verify binaries (aarch64-macos)
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor
