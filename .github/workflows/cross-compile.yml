name: cross-compile

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux targets build inside Alpine (musl-native) so static OpenSSL archives
  # are musl-compatible.  Produces fully static binaries (zero dynamic deps)
  # that run on any Linux: bookworm containers (Fly.io) and Trixie bare-metal.
  cross-compile-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            arch: x86_64
          - target: aarch64-linux
            os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    container:
      image: mirror.gcr.io/library/alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz binutils file
          mkdir -p /usr/lib/${{ matrix.arch }}-linux-gnu /usr/include/${{ matrix.arch }}-linux-gnu
          ln -sf /usr/lib/libssl.a /usr/lib/${{ matrix.arch }}-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/${{ matrix.arch }}-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/${{ matrix.arch }}-linux-gnu/openssl

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Compile zombied + zombied-executor (${{ matrix.target }})
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Verify static ELF — zero NEEDED, no INTERP (${{ matrix.target }})
        run: |
          for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
            test -f "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
              echo "FAIL: $bin has dynamic NEEDED entries"
              readelf -d "$bin" | grep NEEDED
              exit 1
            fi
            if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
              echo "FAIL: $bin has INTERP (dynamic linker) section"
              exit 1
            fi
            echo "✓ $bin: fully static (zero NEEDED, no INTERP)"
          done

      - name: Upload x86_64 binary for runtime compat check
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: zombied-linux-amd64-ci
          path: zig-out/bin/zombied
          retention-days: 1

  # Verify the static x86_64 binary executes (ldd = "not a dynamic executable")
  # across bookworm, alpine, and trixie — proving it runs on any Linux.
  verify-runtime-compat:
    runs-on: ubuntu-latest
    needs: cross-compile-linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zombied-linux-amd64-ci
          path: dist

      - name: Make binary executable
        run: chmod +x dist/zombied

      - name: Verify in debian:bookworm-slim (Fly.io target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:bookworm-slim \
            sh -c 'ldd /test/zombied | grep -q "not a dynamic executable" && echo "✓ bookworm-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in bookworm-slim"; ldd /test/zombied; exit 1)'

      - name: Verify in alpine:latest (musl-native)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            alpine:latest \
            sh -c 'ldd /test/zombied 2>&1 | grep -qiE "not a dynamic|Not a valid dynamic" && echo "✓ alpine: static binary confirmed" || (echo "FAIL: dynamic deps found in alpine"; ldd /test/zombied; exit 1)'

      - name: Verify in debian:trixie-slim (bare-metal worker target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:trixie-slim \
            sh -c 'ldd /test/zombied | grep -q "not a dynamic executable" && echo "✓ trixie-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in trixie-slim"; ldd /test/zombied; exit 1)'

  cross-compile-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Compile zombied + zombied-executor (aarch64-macos)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Verify binaries (aarch64-macos)
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor
