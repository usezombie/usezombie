name: cross-compile

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux targets build inside Alpine (musl-native) so static OpenSSL archives
  # are musl-compatible.  Produces fully static binaries (zero dynamic deps)
  # that run on any Linux: bookworm containers (Fly.io) and Trixie bare-metal.
  cross-compile-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            arch: x86_64
            container: mirror.gcr.io/library/alpine:3.21
          - target: aarch64-linux
            os: ubuntu-24.04-arm
            arch: aarch64
            container: mirror.gcr.io/library/debian:bookworm-slim
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Install build dependencies (Alpine)
        if: contains(matrix.container, 'alpine')
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz
          mkdir -p /usr/lib/${{ matrix.arch }}-linux-gnu /usr/include/${{ matrix.arch }}-linux-gnu
          ln -sf /usr/lib/libssl.a /usr/lib/${{ matrix.arch }}-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/${{ matrix.arch }}-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/${{ matrix.arch }}-linux-gnu/openssl

      - name: Install build dependencies (Debian)
        if: contains(matrix.container, 'debian')
        run: apt-get update && apt-get install -y --no-install-recommends git libssl-dev ca-certificates xz-utils

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Compile zombied + zombied-executor (${{ matrix.target }})
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Verify binaries (${{ matrix.target }})
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor

  cross-compile-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Compile zombied + zombied-executor (aarch64-macos)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Verify binaries (aarch64-macos)
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor
