name: cross-compile

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  workflow_call:
    # Called by release.yml to run verify-runtime-compat against release binaries.
    # Callers are responsible for building and uploading the artifact named
    # "zombied-linux-amd64-ci" before invoking this workflow.
    inputs:
      skip_build:
        description: "Set to 'true' to skip build jobs and only run verify-runtime-compat"
        type: string
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # x86_64: build inside Alpine container — musl-native OpenSSL, fully static output.
  # JS actions work inside Alpine on x86_64 runners.
  cross-compile-linux-x86:
    if: inputs.skip_build != 'true'
    runs-on: ubuntu-latest
    container:
      image: mirror.gcr.io/library/alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz binutils tar
          mkdir -p /usr/lib/x86_64-linux-gnu /usr/include/x86_64-linux-gnu
          ln -sf /usr/lib/libssl.a    /usr/lib/x86_64-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/x86_64-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/x86_64-linux-gnu/openssl

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-zig
        with:
          version: 0.15.2

      - name: Compile zombied + zombied-executor (x86_64-linux)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux

      - name: Verify static ELF — zero NEEDED, no INTERP (x86_64-linux)
        run: |
          for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
            test -f "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
              echo "FAIL: $bin has dynamic NEEDED entries"
              readelf -d "$bin" | grep NEEDED
              exit 1
            fi
            if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
              echo "FAIL: $bin has INTERP (dynamic linker) section"
              exit 1
            fi
            echo "✓ $bin: fully static (zero NEEDED, no INTERP)"
          done

      - name: Upload x86_64 binary for runtime compat check
        uses: actions/upload-artifact@v4
        with:
          name: zombied-linux-amd64-ci
          path: zig-out/bin/zombied
          retention-days: 1

  # aarch64: JS actions cannot run inside Alpine on ARM64 runners.
  # Solution: use the bare ubuntu-24.04-arm runner (JS actions work fine),
  # then invoke `docker run alpine:3.21` for the Zig build step to get
  # musl-native static OpenSSL — the same pattern as `make build-linux-alpine`.
  cross-compile-linux-aarch64:
    if: inputs.skip_build != 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Build aarch64-linux inside Alpine (musl-native static OpenSSL)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/zig-out/bin"
          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -v "$GITHUB_WORKSPACE/zig-out:/zig-out" \
            mirror.gcr.io/library/alpine:3.21 \
            sh -c '
              set -e
              apk add --no-cache openssl-dev openssl-libs-static ca-certificates xz wget binutils >/dev/null 2>&1
              mkdir -p /usr/lib/aarch64-linux-gnu /usr/include/aarch64-linux-gnu
              ln -sf /usr/lib/libssl.a    /usr/lib/aarch64-linux-gnu/libssl.a
              ln -sf /usr/lib/libcrypto.a /usr/lib/aarch64-linux-gnu/libcrypto.a
              ln -sf /usr/include/openssl /usr/include/aarch64-linux-gnu/openssl
              cp -a /src/. /build
              cd /build
              echo "  fetching zig 0.15.2 for aarch64..."
              wget -q https://ziglang.org/download/0.15.2/zig-aarch64-linux-0.15.2.tar.xz -O /tmp/zig.tar.xz
              echo "958ed7d1e00d0ea76590d27666efbf7a932281b3d7ba0c6b01b0ff26498f667f  /tmp/zig.tar.xz" | sha256sum -c -
              (cd /tmp && tar xf zig.tar.xz)
              export PATH="/tmp/zig-aarch64-linux-0.15.2:$PATH"
              echo "  compiling zombied + zombied-executor (aarch64-linux)..."
              zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux
              for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
                test -f "$bin"
                if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
                  echo "FAIL: $bin has dynamic NEEDED entries"
                  readelf -d "$bin" | grep NEEDED
                  exit 1
                fi
                if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
                  echo "FAIL: $bin has INTERP (dynamic linker) section"
                  exit 1
                fi
                echo "  ✓ $bin: fully static (zero NEEDED, no INTERP)"
              done
              cp zig-out/bin/zombied          /zig-out/bin/zombied
              cp zig-out/bin/zombied-executor /zig-out/bin/zombied-executor
            '

      - name: Verify output artifacts (aarch64-linux)
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor
          echo "✓ aarch64-linux artifacts present"

  # Verify the static x86_64 binary runs on all target Linux environments
  # (bookworm = Fly.io, alpine = musl-native, trixie = bare-metal worker).
  # ldd "not a dynamic executable" proves no dynamic linker dependency.
  verify-runtime-compat:
    runs-on: ubuntu-latest
    needs: cross-compile-linux-x86
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zombied-linux-amd64-ci
          path: dist

      - name: Make binary executable
        run: chmod +x dist/zombied

      - name: Verify in debian:bookworm-slim (Fly.io target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:bookworm-slim \
            sh -c 'ldd /test/zombied 2>&1 | grep -q "not a dynamic executable" && echo "✓ bookworm-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in bookworm-slim"; ldd /test/zombied 2>&1; exit 1)'

      - name: Verify in alpine:3.21 (musl-native)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            mirror.gcr.io/library/alpine:3.21 \
            sh -c 'ldd /test/zombied 2>&1 | grep -qiE "not a dynamic|Not a valid dynamic" && echo "✓ alpine: static binary confirmed" || (echo "FAIL: dynamic deps found in alpine"; ldd /test/zombied 2>&1; exit 1)'

      - name: Verify in debian:trixie-slim (bare-metal worker target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:trixie-slim \
            sh -c 'ldd /test/zombied 2>&1 | grep -q "not a dynamic executable" && echo "✓ trixie-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in trixie-slim"; ldd /test/zombied 2>&1; exit 1)'

  cross-compile-macos:
    if: inputs.skip_build != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-zig
        with:
          version: 0.15.2

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Compile zombied + zombied-executor (aarch64-macos)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Verify binaries (aarch64-macos)
        run: |
          test -f zig-out/bin/zombied
          test -f zig-out/bin/zombied-executor
