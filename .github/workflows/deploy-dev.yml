name: deploy (dev)

# Triggers on every push to main.
# Flow: compile binaries (Debian bookworm container, matching runtime GLIBC)
#       → push dev-latest image to GHCR
#       → fly deploy zombied-dev (API)
#       → SSH deploy zombie-dev-worker-ant (bare-metal worker, Tailscale)
#       → wait /healthz green (via Cloudflare Tunnel) → QA smoke → Discord notify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── 0. Credential gate — all DEV vault items must exist ─────────────────
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: 1password/install-cli-action@v3

      - name: Check vault credentials
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VAULT_DEV: ${{ vars.VAULT_DEV }}
          VAULT_PROD: ${{ vars.VAULT_PROD }}
        run: ./playbooks/002_preflight/00_gate.sh

  # ── 1a. Compile linux/amd64 binaries (Alpine — musl-native static OpenSSL) ─
  # Build inside Alpine so static OpenSSL archives are musl-compatible.
  # Produces fully static binaries that run on bookworm (Fly.io) and Trixie (bare-metal).
  compile-dev:
    needs: check-credentials
    runs-on: ubuntu-latest
    container:
      # Pre-baked: alpine:3.21 + Zig 0.15.2 + apk deps + x86_64-linux-gnu OpenSSL
      # static-link symlinks. Multi-arch image; linux/amd64 selected on x86_64 runner.
      image: ghcr.io/usezombie/ci-zig-alpine:0.15.2
    steps:
      - uses: actions/checkout@v6

      - name: Build linux/amd64 binaries
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl -Dgit-commit="${GITHUB_SHA::7}"
          zig build --build-file build_runner.zig -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl
          mkdir -p dist
          cp zig-out/bin/zombied       dist/zombied-linux-amd64
          cp zig-out/bin/zombie-runner dist/zombie-runner-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: dev-binaries
          path: |
            dist/zombied-linux-amd64
            dist/zombie-runner-linux-amd64
          retention-days: 3

  # ── 1b. Build Docker image and push dev-latest to GHCR ───────────────────
  # Runs on the Ubuntu runner (Docker daemon required; not available inside a
  # container job).  Downloads compiled binaries from compile-dev.
  push-dev:
    needs: compile-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dev-binaries
          path: dist

      - uses: docker/setup-buildx-action@v4

      - name: Push dev-latest to GHCR
        run: make push-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORMS: linux/amd64

  # ── 2. Deploy to Fly.io DEV ─────────────────────────────────────────────
  deploy-fly-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: push-dev
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_DEV }}/fly-api-token/credential
          DATABASE_URL_API: op://${{ vars.VAULT_DEV }}/planetscale-dev/api-connection-string
          DATABASE_URL_WORKER: op://${{ vars.VAULT_DEV }}/planetscale-dev/worker-connection-string
          DATABASE_URL_MIGRATOR: op://${{ vars.VAULT_DEV }}/planetscale-dev/migrator-connection-string
          REDIS_URL_API: op://${{ vars.VAULT_DEV }}/upstash-dev/api-url
          REDIS_URL_WORKER: op://${{ vars.VAULT_DEV }}/upstash-dev/worker-url
          ENCRYPTION_MASTER_KEY: op://${{ vars.VAULT_DEV }}/encryption-master-key/credential
          AUTH_SESSION_CODE_PEPPER: op://${{ vars.VAULT_DEV }}/auth-session-code-pepper/credential
          AUDIT_LOG_PEPPER: op://${{ vars.VAULT_DEV }}/audit-log-pepper/credential
          POSTHOG_API_KEY: op://${{ vars.VAULT_DEV }}/posthog-dev/credential
          GITHUB_APP_ID: op://${{ vars.VAULT_DEV }}/github-app/app-id
          GITHUB_APP_PRIVATE_KEY: op://${{ vars.VAULT_DEV }}/github-app/private-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/publishable-key
          CLERK_SECRET_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/secret-key
          CLERK_WEBHOOK_SECRET: op://${{ vars.VAULT_DEV }}/clerk-dev/webhook-secret
          GRAFANA_OTLP_ENDPOINT: op://${{ vars.VAULT_DEV }}/grafana-dev/otlp-endpoint
          GRAFANA_OTLP_INSTANCE_ID: op://${{ vars.VAULT_DEV }}/grafana-dev/instance-id
          GRAFANA_OTLP_API_KEY: op://${{ vars.VAULT_DEV }}/grafana-dev/api-key
          OIDC_JWKS_URL: op://${{ vars.VAULT_DEV }}/clerk-dev/jwks-url
          OIDC_ISSUER: op://${{ vars.VAULT_DEV }}/clerk-dev/issuer

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage Fly secrets from vault (applied on next deploy)
        run: |
          flyctl secrets set \
            LOG_LEVEL="debug" \
            DATABASE_URL_API="$DATABASE_URL_API" \
            DATABASE_URL_WORKER="$DATABASE_URL_WORKER" \
            DATABASE_URL_MIGRATOR="$DATABASE_URL_MIGRATOR" \
            REDIS_URL_API="$REDIS_URL_API" \
            REDIS_URL_WORKER="$REDIS_URL_WORKER" \
            ENCRYPTION_MASTER_KEY="$ENCRYPTION_MASTER_KEY" \
            AUTH_SESSION_CODE_PEPPER="$AUTH_SESSION_CODE_PEPPER" \
            AUDIT_LOG_PEPPER="$AUDIT_LOG_PEPPER" \
            POSTHOG_API_KEY="$POSTHOG_API_KEY" \
            GITHUB_APP_ID="$GITHUB_APP_ID" \
            GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" \
            CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY" \
            CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            CLERK_WEBHOOK_SECRET="$CLERK_WEBHOOK_SECRET" \
            OIDC_JWKS_URL="$OIDC_JWKS_URL" \
            OIDC_ISSUER="$OIDC_ISSUER" \
            OIDC_PROVIDER="clerk" \
            OIDC_AUDIENCE="https://api-dev.usezombie.com" \
            GRAFANA_OTLP_ENDPOINT="$GRAFANA_OTLP_ENDPOINT" \
            GRAFANA_OTLP_INSTANCE_ID="$GRAFANA_OTLP_INSTANCE_ID" \
            GRAFANA_OTLP_API_KEY="$GRAFANA_OTLP_API_KEY" \
            --stage \
            --app "${{ vars.FLY_APP_DEV }}"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Deploy zombied-dev
        run: |
          flyctl deploy --app "${{ vars.FLY_APP_DEV }}" --image ghcr.io/usezombie/zombied:dev-latest --config deploy/fly/zombied-dev/fly.toml --wait-timeout 120 || STATUS=$?
          STATUS=${STATUS:-0}
          flyctl deploy --app "${{ vars.FLY_APP_DEV }}" --image ghcr.io/usezombie/zombied:dev-latest --config deploy/fly/zombied-dev/fly.toml --wait-timeout 120
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            APP="${{ vars.FLY_APP_DEV }}"
            echo "Fly deploy failed; collecting diagnostics for ${APP}..."
            flyctl status --app "${APP}" || true
            echo "Fly releases:"
            flyctl releases --app "${APP}" || true
            echo "Fly logs (bounded to 30s):"
            timeout 30s flyctl logs --app "${APP}" || true
          fi
          exit "$STATUS"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  # ── 3. Deploy DEV worker to bare-metal via Tailscale SSH ─────────────────
  # Skips until zombie-dev-worker-ant bootstrap is complete (M4_001).
  # Enable by setting DEV_WORKER_READY=true in GitHub → Settings → Variables.
  deploy-worker-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # needs push-dev so the bare-metal worker and Fly.io API always move together:
    # if Docker push fails the worker binary is not updated either, keeping DEV consistent.
    needs: [compile-dev, push-dev]
    if: vars.DEV_WORKER_READY == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dev-binaries
          path: dist

      - name: Load DEV worker secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          WORKER_ANT_SSH_KEY: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/ssh-private-key
          WORKER_ANT_HOST: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/tailscale-hostname
          WORKER_ANT_USER: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/deploy-user
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Join Tailscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify worker host readiness
        run: VAULT_DEV="${{ vars.VAULT_DEV }}" ./playbooks/006_worker_bootstrap_dev/03_deploy_readiness.sh
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Deploy runner to bare-metal
        timeout-minutes: 8
        run: |
          ANT_KEY="$RUNNER_TEMP/dev-worker-ant.key"
          printf '%s\n' "$WORKER_ANT_SSH_KEY" > "$ANT_KEY"
          chmod 600 "$ANT_KEY"
          SSH="ssh -i $ANT_KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=6"
          SCP="scp -i $ANT_KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15"
          TARGET="${WORKER_ANT_USER}@${WORKER_ANT_HOST}"
          VERSION="dev-${GITHUB_SHA::7}"

          # Stage binaries, deploy script, and systemd units on the server
          $SSH "$TARGET" "mkdir -p /opt/zombie/bin /opt/zombie/deploy"
          $SCP dist/zombie-runner-linux-amd64 "$TARGET:/opt/zombie/bin/zombie-runner"
          $SCP deploy/baremetal/deploy.sh     "$TARGET:/opt/zombie/deploy/deploy.sh"
          $SCP deploy/baremetal/*.service     "$TARGET:/opt/zombie/deploy/"
          $SSH "$TARGET" "chmod +x /opt/zombie/deploy/deploy.sh /opt/zombie/bin/*"

          # Log binary type and shared library deps for diagnostics
          $SSH "$TARGET" "file /opt/zombie/bin/zombie-runner && ldd /opt/zombie/bin/zombie-runner 2>&1 || true"

          # Write Discord webhook to server env file. deploy.sh sources this file
          # at startup so the value never appears in sudo's argument list and stays
          # out of ps/cmdline output. Cleanup runs in a separate always step below.
          $SSH "$TARGET" "printf 'DISCORD_WEBHOOK_URL=%s\n' '$DISCORD_WEBHOOK_URL' > /opt/zombie/.discord-env && chmod 600 /opt/zombie/.discord-env"

          # ── Diagnostics: verify sudo works without password prompt ──
          echo "::group::sudo diagnostics"
          $SSH "$TARGET" "echo 'ssh ok'; sudo -n true && echo 'sudo NOPASSWD ok' || echo 'FAIL: sudo requires password'"
          $SSH "$TARGET" "sudo -n id && echo 'sudo id ok' || echo 'FAIL: sudo -n id failed'"
          $SSH "$TARGET" "systemctl is-active zombie-runner.service 2>&1 || echo 'runner: not active (first deploy?)'"
          echo "::endgroup::"

          # Deploy the runner. DRAIN_TIMEOUT=60 keeps drain within CI budget.
          # deploy.sh sources /opt/zombie/.discord-env for DISCORD_WEBHOOK_URL.
          # NOTE: the runner needs three vars in /etc/default/zombie-runner:
          #   ZOMBIE_API_URL, ZOMBIE_RUNNER_TOKEN (a pre-minted zrn_; Option B),
          #   RUNNER_HOST_ID
          # — provisioned per host by playbooks/006_worker_bootstrap_dev/
          # 04_provision_runner_env.sh; this job stays gated off
          # (DEV_WORKER_READY) until the placeholder zrn_ in vault has been
          # swapped for a real admin-minted token and the runner is verified
          # active.
          echo ">>> deploying runner..."
          $SSH "$TARGET" \
            "sudo DRAIN_TIMEOUT=60 /opt/zombie/deploy/deploy.sh runner $VERSION /opt/zombie/bin/zombie-runner"

      - name: Clean up Discord env file on server
        if: always()
        run: |
          ANT_KEY="$RUNNER_TEMP/dev-worker-ant.key"
          if [ -f "$ANT_KEY" ] && [ -n "${WORKER_ANT_USER:-}" ] && [ -n "${WORKER_ANT_HOST:-}" ]; then
            ssh -i "$ANT_KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              "${WORKER_ANT_USER}@${WORKER_ANT_HOST}" "rm -f /opt/zombie/.discord-env" || true
          fi
          rm -f "$ANT_KEY"

  # ── 4. Wait for Fly DEV to go green (via Cloudflare Tunnel) ─────────────
  verify-dev:
    runs-on: ubuntu-latest
    needs: deploy-fly-dev
    steps:
      - uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_DEV }}/fly-api-token/credential
          TUNNEL_TOKEN: op://${{ vars.VAULT_DEV }}/cloudflare-tunnel-dev/credential

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure cloudflared-dev tunnel is running
        # cloudflared-dev is a separate Fly app that bridges Cloudflare Edge to
        # zombied-dev.internal:3000 over 6PN. If its machines are stopped/crashed
        # every /healthz poll returns status=000 (no route). Restart or deploy if needed.
        # Sync TUNNEL_TOKEN from vault on every deploy so a rotated secret is always
        # pushed before we check tunnel health — prevents "Invalid tunnel secret" failures.
        run: |
          TUNNEL_APP="cloudflared-dev"
          TUNNEL_CONFIG="deploy/fly/cloudflared-dev/fly.toml"
          echo "Syncing tunnel token from vault..."
          flyctl secrets set TUNNEL_TOKEN="$TUNNEL_TOKEN" --app "$TUNNEL_APP"
          echo "Checking tunnel connector ($TUNNEL_APP)..."
          MACHINES="$(flyctl machine list --app "$TUNNEL_APP" --json 2>/dev/null || echo '[]')"
          RUNNING="$(echo "$MACHINES" | jq '[.[] | select(.state == "started")] | length')"
          TOTAL="$(echo "$MACHINES" | jq 'length')"
          echo "  machines: $RUNNING/$TOTAL running"
          if [ "$RUNNING" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
            echo "  ▲ no running machines — restarting..."
            for MID in $(echo "$MACHINES" | jq -r '.[].id'); do
              flyctl machine start "$MID" --app "$TUNNEL_APP" || true
            done
            echo "  waiting 15s for tunnel reconnect..."
            sleep 15
          elif [ "$TOTAL" -eq 0 ]; then
            echo "  ▲ no machines found — deploying $TUNNEL_APP from scratch..."
            flyctl deploy --app "$TUNNEL_APP" --config "$TUNNEL_CONFIG" --wait-timeout 60 \
              || { echo "  ✗ flyctl deploy failed for $TUNNEL_APP — check logs above"; true; }
            echo "  waiting 15s for tunnel reconnect..."
            sleep 15
          else
            echo "  ✓ tunnel is running"
          fi
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Pre-warm zombied-dev machines
        # min_machines_running is enforced eventually; auto_start_machines is
        # a no-op for 6PN ingress (cloudflared bypasses the Fly proxy). Issue
        # an explicit start to all machines before polling /healthz so the
        # gate is deterministic instead of waiting on Fly to converge.
        run: |
          APP="${{ vars.FLY_APP_DEV }}"
          echo "Starting all machines for $APP..."
          MACHINES="$(flyctl machine list --app "$APP" --json 2>/dev/null || echo '[]')"
          echo "Machine list: $(echo "$MACHINES" | jq -r '[.[] | {id: .id, state: .state}]' 2>/dev/null || echo "$MACHINES")"
          echo "$MACHINES" | jq -r '.[].id' | while read -r MID; do
            [ -n "$MID" ] || continue
            echo "  flyctl machine start $MID"
            flyctl machine start "$MID" --app "$APP" || true
          done
          # flyctl machine start is async; give release_command (`zombied migrate`)
          # + serve startup time to settle so the 180s /healthz loop isn't doing
          # all the real waiting on a cold start.
          sleep 20
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Wait for zombied-dev to go green
        # Poll /healthz via Cloudflare Tunnel until green or timeout (3 min).
        # Prints HTTP status + response body on each attempt for diagnostics.
        run: |
          echo "Waiting for zombied-dev..."
          STATUS="000"
          for i in $(seq 1 18); do
            BODY=$(curl -sf -w "\n%{http_code}" \
              https://api-dev.usezombie.com/healthz 2>&1 || echo -e "\n000")
            STATUS=$(echo "$BODY" | tail -1)
            RESP=$(echo "$BODY" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS body=$RESP — retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 180s (last status=$STATUS)"
            exit 1
          fi

      - name: Check /readyz
        run: |
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true'

      - name: Diagnose tunnel failure
        if: failure()
        run: |
          echo "=== zombied-dev machine status ==="
          flyctl machine list --app zombied-dev || true
          echo "=== cloudflared-dev machine status ==="
          flyctl machine list --app cloudflared-dev || true
          echo "=== DNS resolution ==="
          nslookup api-dev.usezombie.com || true
          echo "=== curl verbose ==="
          curl -v --max-time 10 https://api-dev.usezombie.com/healthz 2>&1 || true
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  # ── 4. QA smoke tests against DEV ───────────────────────────────────────
  qa-dev:
    runs-on: ubuntu-latest
    needs: verify-dev
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Load Vercel bypass secret from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VERCEL_BYPASS_SECRET: op://${{ vars.VAULT_PROD }}/vercel-bypass-app/credential

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app

      - name: Restore Playwright browser cache
        id: playwright-cache-app
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-app-${{ hashFiles('ui/packages/app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-app-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-app.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/app

      - name: Run smoke tests against DEV
        run: bun run test:e2e:smoke
        working-directory: ui/packages/app
        env:
          BASE_URL: https://usezombie-app.vercel.app
          VERCEL_BYPASS_SECRET: ${{ env.VERCEL_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-dev-${{ github.sha }}
          path: ui/packages/app/playwright-report/
          retention-days: 7

  # ── 4b. Acceptance e2e against DEV ──────────────────────────────────────
  # Mirrors the qa-dev structure but loads Clerk DEV credentials and runs
  # the acceptance suite (tests/e2e/acceptance/**). Failures gate the notify
  # step.
  #
  # `https://usezombie-app.vercel.app` is the dev-facing dashboard — the
  # `usezombie-app` Vercel project's Production env has
  # `NEXT_PUBLIC_API_URL=https://api-dev.usezombie.com` baked in (the
  # production-customer dashboard lives behind the `app.usezombie.com`
  # custom domain via a separate project). Same URL that `qa-dev` above
  # uses for the unauthenticated smoke. The harness-side
  # `NEXT_PUBLIC_API_URL` env below feeds the direct fixture-seeding
  # fetch() calls (clerk-admin, bootstrap, api-client) — Next.js bakes
  # `NEXT_PUBLIC_*` at build time, so this var doesn't steer the
  # dashboard's API calls.
  acceptance-e2e-dev:
    runs-on: ubuntu-latest
    needs: verify-dev
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Load Clerk DEV credentials from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLERK_SECRET_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/secret-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/publishable-key
          CLERK_WEBHOOK_SECRET: op://${{ vars.VAULT_DEV }}/clerk-dev/webhook-secret
          VERCEL_BYPASS_SECRET: op://${{ vars.VAULT_PROD }}/vercel-bypass-app/credential

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app

      - name: Restore Playwright browser cache
        id: playwright-cache-acceptance
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-app-${{ hashFiles('ui/packages/app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-app-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-acceptance.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/app

      - name: Run acceptance e2e against DEV
        run: bun run test:e2e:acceptance
        working-directory: ui/packages/app
        env:
          BASE_URL: https://usezombie-app.vercel.app
          NEXT_PUBLIC_API_URL: https://api-dev.usezombie.com
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ env.CLERK_WEBHOOK_SECRET }}
          VERCEL_BYPASS_SECRET: ${{ env.VERCEL_BYPASS_SECRET }}

      - name: Upload acceptance Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: acceptance-e2e-dev-${{ github.sha }}
          path: ui/packages/app/playwright-acceptance-report/
          retention-days: 7

  # ── 4b. zombiectl acceptance against api-dev ─────────────────────────────
  # Drives the published-shape CLI surface end-to-end against the freshly
  # deployed api-dev. Mirrors acceptance-e2e-dev's structure: load Clerk DEV
  # credentials AFTER `bun install` (WS-E #C2 — postinstall sees no Clerk
  # admin key). The lifecycle-after-login spec uses Playwright Chromium to
  # drive the dashboard's /cli-auth/{session_id} handoff page (lands in
  # the M65_001 sibling); skips automatically when ZOMBIE_ACCEPTANCE_DASHBOARD_URL
  # is unset.
  cli-acceptance-dev:
    runs-on: ubuntu-latest
    needs: verify-dev
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install zombiectl dependencies (BEFORE secret load — WS-E #C2)
        run: bun install --frozen-lockfile
        working-directory: zombiectl

      - name: Restore Playwright browser cache
        id: playwright-cache-cli
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-zombiectl-${{ hashFiles('zombiectl/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-zombiectl-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-cli.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: zombiectl

      - name: Load Clerk DEV credentials from 1Password (AFTER install)
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLERK_SECRET_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/secret-key
          AUTH_E2E_REGULAR_EMAIL: op://${{ vars.VAULT_DEV }}/e2e-fixtures-email/regular
          AUTH_E2E_ADMIN_EMAIL: op://${{ vars.VAULT_DEV }}/e2e-fixtures-email/admin

      - name: Run CLI acceptance suite against api-dev
        run: bun run test:acceptance
        working-directory: zombiectl
        env:
          ZOMBIE_ACCEPTANCE_TARGET: https://api-dev.usezombie.com
          ZOMBIE_ACCEPTANCE_BINARY: worktree
          ZOMBIE_ACCEPTANCE_DASHBOARD_URL: https://usezombie-app.vercel.app
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
          AUTH_E2E_REGULAR_EMAIL: ${{ env.AUTH_E2E_REGULAR_EMAIL }}
          AUTH_E2E_ADMIN_EMAIL: ${{ env.AUTH_E2E_ADMIN_EMAIL }}

      - name: Upload CLI acceptance artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cli-acceptance-dev-${{ github.sha }}
          path: zombiectl/playwright-cli-report/
          retention-days: 7

  # ── 5. Discord notify ────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [qa-dev, acceptance-e2e-dev, cli-acceptance-dev, deploy-worker-dev]
    if: always()
    steps:
      - name: Load Discord webhook from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DISCORD_WEBHOOK: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Notify Discord
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          REF="${{ github.ref_name }}"

          QA="${{ needs.qa-dev.result }}"
          ACC="${{ needs.acceptance-e2e-dev.result }}"
          WORKER="${{ needs.deploy-worker-dev.result }}"

          if [ "$QA" = "success" ] && [ "$ACC" = "success" ] && { [ "$WORKER" = "success" ] || [ "$WORKER" = "skipped" ]; }; then
            COLOR=3066993
            MSG="✅ DEV deploy green — \`$REF\` @ \`$SHORT\`\\n/healthz: ok | QA: passed | acceptance-e2e: passed | worker: ${WORKER}\\n→ ready for tag release"
          else
            COLOR=15158332
            MSG="❌ DEV deploy failed — \`$REF\` @ \`$SHORT\`\\nQA: ${QA} | acceptance-e2e: ${ACC} | worker: ${WORKER}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"description\":\"$MSG\",\"color\":$COLOR}]}"
