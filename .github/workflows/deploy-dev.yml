name: deploy (dev)

# Triggers on every push to main.
# Flow: compile binaries (Debian bookworm container, matching runtime GLIBC)
#       → push dev-latest image to GHCR
#       → fly deploy zombied-dev (API)
#       → SSH deploy zombie-dev-worker-ant (bare-metal worker, Tailscale)
#       → wait /healthz green (via Cloudflare Tunnel) → QA smoke → Discord notify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── 0. Credential gate — all DEV vault items must exist ─────────────────
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: 1password/install-cli-action@v3

      - name: Check vault credentials
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VAULT_DEV: ${{ vars.VAULT_DEV }}
          VAULT_PROD: ${{ vars.VAULT_PROD }}
        run: ./playbooks/gates/check-credentials.sh

  # ── 1a. Compile linux/amd64 binaries (Alpine — musl-native static OpenSSL) ─
  # Build inside Alpine so static OpenSSL archives are musl-compatible.
  # Produces fully static binaries that run on bookworm (Fly.io) and Trixie (bare-metal).
  compile-dev:
    needs: check-credentials
    runs-on: ubuntu-latest
    container:
      image: mirror.gcr.io/library/alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz tar
          mkdir -p /usr/lib/x86_64-linux-gnu /usr/include/x86_64-linux-gnu
          ln -sf /usr/lib/libssl.a /usr/lib/x86_64-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/x86_64-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/x86_64-linux-gnu/openssl

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build linux/amd64 binaries
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux
          mkdir -p dist
          cp zig-out/bin/zombied          dist/zombied-linux-amd64
          cp zig-out/bin/zombied-executor dist/zombied-executor-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: dev-binaries
          path: |
            dist/zombied-linux-amd64
            dist/zombied-executor-linux-amd64
          retention-days: 3

  # ── 1b. Build Docker image and push dev-latest to GHCR ───────────────────
  # Runs on the Ubuntu runner (Docker daemon required; not available inside a
  # container job).  Downloads compiled binaries from compile-dev.
  push-dev:
    needs: compile-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dev-binaries
          path: dist

      - uses: docker/setup-buildx-action@v4

      - name: Push dev-latest to GHCR
        run: make push-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORMS: linux/amd64

  # ── 2. Deploy to Fly.io DEV ─────────────────────────────────────────────
  deploy-fly-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: push-dev
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_DEV }}/fly-api-token/credential
          DATABASE_URL_API: op://${{ vars.VAULT_DEV }}/planetscale-dev/api-connection-string
          DATABASE_URL_WORKER: op://${{ vars.VAULT_DEV }}/planetscale-dev/worker-connection-string
          DATABASE_URL_MIGRATOR: op://${{ vars.VAULT_DEV }}/planetscale-dev/migrator-connection-string
          REDIS_URL_API: op://${{ vars.VAULT_DEV }}/upstash-dev/api-url
          REDIS_URL_WORKER: op://${{ vars.VAULT_DEV }}/upstash-dev/worker-url
          ENCRYPTION_MASTER_KEY: op://${{ vars.VAULT_DEV }}/encryption-master-key/credential
          POSTHOG_API_KEY: op://${{ vars.VAULT_DEV }}/posthog-dev/credential
          GITHUB_APP_ID: op://${{ vars.VAULT_DEV }}/github-app/app-id
          GITHUB_APP_PRIVATE_KEY: op://${{ vars.VAULT_DEV }}/github-app/private-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/publishable-key
          CLERK_SECRET_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/secret-key
          GRAFANA_OTLP_ENDPOINT: op://${{ vars.VAULT_DEV }}/grafana-dev/otlp-endpoint
          GRAFANA_OTLP_INSTANCE_ID: op://${{ vars.VAULT_DEV }}/grafana-dev/instance-id
          GRAFANA_OTLP_API_KEY: op://${{ vars.VAULT_DEV }}/grafana-dev/api-key

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage Fly secrets from vault (applied on next deploy)
        run: |
          flyctl secrets set \
            LOG_LEVEL="debug" \
            DATABASE_URL_API="$DATABASE_URL_API" \
            DATABASE_URL_WORKER="$DATABASE_URL_WORKER" \
            DATABASE_URL_MIGRATOR="$DATABASE_URL_MIGRATOR" \
            REDIS_URL_API="$REDIS_URL_API" \
            REDIS_URL_WORKER="$REDIS_URL_WORKER" \
            ENCRYPTION_MASTER_KEY="$ENCRYPTION_MASTER_KEY" \
            POSTHOG_API_KEY="$POSTHOG_API_KEY" \
            GITHUB_APP_ID="$GITHUB_APP_ID" \
            GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" \
            CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY" \
            CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            GRAFANA_OTLP_ENDPOINT="$GRAFANA_OTLP_ENDPOINT" \
            GRAFANA_OTLP_INSTANCE_ID="$GRAFANA_OTLP_INSTANCE_ID" \
            GRAFANA_OTLP_API_KEY="$GRAFANA_OTLP_API_KEY" \
            --stage \
            --app "${{ vars.FLY_APP_DEV }}"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Deploy zombied-dev
        run: |
          flyctl deploy --app "${{ vars.FLY_APP_DEV }}" --image ghcr.io/usezombie/zombied:dev-latest --config deploy/fly/zombied-dev/fly.toml --wait-timeout 120 || STATUS=$?
          STATUS=${STATUS:-0}
          flyctl deploy --app "${{ vars.FLY_APP_DEV }}" --image ghcr.io/usezombie/zombied:dev-latest --config deploy/fly/zombied-dev/fly.toml --wait-timeout 120
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            APP="${{ vars.FLY_APP_DEV }}"
            echo "Fly deploy failed; collecting diagnostics for ${APP}..."
            flyctl status --app "${APP}" || true
            echo "Fly releases:"
            flyctl releases --app "${APP}" || true
            echo "Fly logs (bounded to 30s):"
            timeout 30s flyctl logs --app "${APP}" || true
          fi
          exit "$STATUS"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify Fly machine state (deploy settled)
        run: |
          APP="${{ vars.FLY_APP_DEV }}"
          echo "Checking Fly machine state for ${APP}..."
          for i in $(seq 1 12); do
            OUT="$(flyctl machine list --app "${APP}" || true)"
            echo "${OUT}"
            if echo "${OUT}" | grep -qiE '\b(started|stopped)\b'; then
              echo "✓ at least one machine is in a settled state (started/stopped) for ${APP}"
              exit 0
            fi
            echo "attempt ${i}/12: no settled machine yet; retrying in 5s..."
            sleep 5
          done
          echo "✗ no settled machine found for ${APP} after 60s"
          echo "Fly app status for diagnostics:"
          flyctl status --app "${APP}" || true
          echo "Fly machine detail diagnostics:"
          if command -v jq >/dev/null 2>&1; then
            while IFS= read -r machine_id; do
              [ -n "${machine_id}" ] || continue
              echo "--- machine status: ${machine_id} ---"
              flyctl machine status "${machine_id}" --app "${APP}" || true
            done < <(flyctl machine list --app "${APP}" --json 2>/dev/null | jq -r '.[].id')
          else
            echo "jq unavailable; skipping per-machine status output"
          fi
          echo "Fly app logs (bounded to 30s):"
          timeout 30s flyctl logs --app "${APP}" || true
          exit 1
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  # ── 3. Deploy DEV worker to bare-metal via Tailscale SSH ─────────────────
  # Skips until zombie-dev-worker-ant bootstrap is complete (M4_001).
  # Enable by setting DEV_WORKER_READY=true in GitHub → Settings → Variables.
  deploy-dev-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # needs push-dev so the bare-metal worker and Fly.io API always move together:
    # if Docker push fails the worker binary is not updated either, keeping DEV consistent.
    needs: [compile-dev, push-dev]
    if: vars.DEV_WORKER_READY == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dev-binaries
          path: dist

      - name: Load DEV worker secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          WORKER_ANT_SSH_KEY: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/ssh-private-key
          WORKER_ANT_HOST: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/tailscale-hostname
          WORKER_ANT_USER: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/deploy-user
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Join Tailscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify worker host readiness
        run: SECTIONS=3 VAULT_DEV="${{ vars.VAULT_DEV }}" ./playbooks/gates/m4_001/run.sh
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Deploy executor + worker to bare-metal
        timeout-minutes: 8
        run: |
          ANT_KEY="$RUNNER_TEMP/dev-worker-ant.key"
          printf '%s\n' "$WORKER_ANT_SSH_KEY" > "$ANT_KEY"
          chmod 600 "$ANT_KEY"
          SSH="ssh -i $ANT_KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=6"
          SCP="scp -i $ANT_KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15"
          TARGET="${WORKER_ANT_USER}@${WORKER_ANT_HOST}"
          VERSION="dev-${GITHUB_SHA::7}"

          # Stage binaries, deploy script, and systemd units on the server
          $SSH "$TARGET" "mkdir -p /opt/zombie/bin /opt/zombie/deploy"
          $SCP dist/zombied-linux-amd64          "$TARGET:/opt/zombie/bin/zombied"
          $SCP dist/zombied-executor-linux-amd64  "$TARGET:/opt/zombie/bin/zombied-executor"
          $SCP deploy/baremetal/deploy.sh         "$TARGET:/opt/zombie/deploy/deploy.sh"
          $SCP deploy/baremetal/*.service          "$TARGET:/opt/zombie/deploy/"
          $SSH "$TARGET" "chmod +x /opt/zombie/deploy/deploy.sh /opt/zombie/bin/*"

          # Log binary type and shared library deps for diagnostics
          $SSH "$TARGET" "file /opt/zombie/bin/zombied /opt/zombie/bin/zombied-executor && ldd /opt/zombie/bin/zombied /opt/zombie/bin/zombied-executor 2>&1 || true"

          # Write Discord webhook to server env file. deploy.sh sources this file
          # at startup so the value never appears in sudo's argument list and stays
          # out of ps/cmdline output. Cleanup runs in a separate always step below.
          $SSH "$TARGET" "printf 'DISCORD_WEBHOOK_URL=%s\n' '$DISCORD_WEBHOOK_URL' > /opt/zombie/.discord-env && chmod 600 /opt/zombie/.discord-env"

          # ── Diagnostics: verify sudo works without password prompt ──
          echo "::group::sudo diagnostics"
          $SSH "$TARGET" "echo 'ssh ok'; sudo -n true && echo 'sudo NOPASSWD ok' || echo 'FAIL: sudo requires password'"
          $SSH "$TARGET" "sudo -n id && echo 'sudo id ok' || echo 'FAIL: sudo -n id failed'"
          $SSH "$TARGET" "systemctl is-active zombied-executor.service 2>&1 || echo 'executor: not active (first deploy?)'"
          $SSH "$TARGET" "systemctl is-active zombied-worker.service 2>&1 || echo 'worker: not active (first deploy?)'"
          echo "::endgroup::"

          # Pre-install both binaries before any service restart. This
          # eliminates drift: even if a restart times out, the on-disk
          # binaries are always current for the next attempt.
          echo ">>> pre-installing binaries..."
          $SSH "$TARGET" "sudo install -m 755 /opt/zombie/bin/zombied-executor /usr/local/bin/zombied-executor"
          $SSH "$TARGET" "sudo install -m 755 /opt/zombie/bin/zombied          /usr/local/bin/zombied"

          # Deploy executor first (worker Requires= it), then worker.
          # DRAIN_TIMEOUT=60 keeps drain within CI budget.
          # deploy.sh sources /opt/zombie/.discord-env for DISCORD_WEBHOOK_URL.
          echo ">>> deploying executor..."
          $SSH "$TARGET" \
            "sudo DRAIN_TIMEOUT=60 /opt/zombie/deploy/deploy.sh executor $VERSION /opt/zombie/bin/zombied-executor"
          echo ">>> deploying worker..."
          $SSH "$TARGET" \
            "sudo DRAIN_TIMEOUT=60 /opt/zombie/deploy/deploy.sh worker $VERSION /opt/zombie/bin/zombied"

      - name: Clean up Discord env file on server
        if: always()
        run: |
          ANT_KEY="$RUNNER_TEMP/dev-worker-ant.key"
          if [ -f "$ANT_KEY" ] && [ -n "${WORKER_ANT_USER:-}" ] && [ -n "${WORKER_ANT_HOST:-}" ]; then
            ssh -i "$ANT_KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              "${WORKER_ANT_USER}@${WORKER_ANT_HOST}" "rm -f /opt/zombie/.discord-env" || true
          fi

  # ── 4. Wait for Fly DEV to go green (via Cloudflare Tunnel) ─────────────
  verify-dev:
    runs-on: ubuntu-latest
    needs: deploy-fly-dev
    steps:
      - name: Wait for zombied-dev to go green
        # Poll /healthz via Cloudflare Tunnel until green or timeout (3 min).
        # Prints HTTP status + response body on each attempt for diagnostics.
        run: |
          echo "Waiting for zombied-dev..."
          STATUS="000"
          for i in $(seq 1 18); do
            BODY=$(curl -sf -w "\n%{http_code}" \
              https://api-dev.usezombie.com/healthz 2>&1 || echo -e "\n000")
            STATUS=$(echo "$BODY" | tail -1)
            RESP=$(echo "$BODY" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS body=$RESP — retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 180s (last status=$STATUS)"
            exit 1
          fi

      - name: Check /readyz
        run: |
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true'

  # ── 4. QA smoke tests against DEV ───────────────────────────────────────
  qa-dev:
    runs-on: ubuntu-latest
    needs: verify-dev
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Load Vercel bypass secret from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VERCEL_BYPASS_SECRET: op://${{ vars.VAULT_PROD }}/vercel-bypass-app/credential

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: ui/packages/app

      - name: Run smoke tests against DEV
        run: bun run test:e2e:smoke
        working-directory: ui/packages/app
        env:
          BASE_URL: https://usezombie-app.vercel.app
          VERCEL_BYPASS_SECRET: ${{ env.VERCEL_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-dev-${{ github.sha }}
          path: ui/packages/app/playwright-report/
          retention-days: 7

  # ── 5. Discord notify ────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [qa-dev, deploy-dev-worker]
    if: always()
    steps:
      - uses: 1password/install-cli-action@v3

      - name: Load Discord webhook from 1Password (retry)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          REF="op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential"
          DELAY=1
          for ATTEMPT in $(seq 1 6); do
            if WEBHOOK="$(op read "$REF" 2>/dev/null)"; then
              echo "DISCORD_WEBHOOK=$WEBHOOK" >> "$GITHUB_ENV"
              exit 0
            fi
            if [ "$ATTEMPT" -lt 6 ]; then
              echo "attempt $ATTEMPT/6: failed to read discord webhook; retrying in ${DELAY}s..."
              sleep "$DELAY"
              DELAY=$((DELAY * 2))
            fi
          done
          echo "failed to read discord webhook from 1Password after retries"
          exit 1

      - name: Notify Discord
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          REF="${{ github.ref_name }}"

          QA="${{ needs.qa-dev.result }}"
          WORKER="${{ needs.deploy-dev-worker.result }}"

          if [ "$QA" = "success" ] && { [ "$WORKER" = "success" ] || [ "$WORKER" = "skipped" ]; }; then
            COLOR=3066993
            MSG="✅ DEV deploy green — \`$REF\` @ \`$SHORT\`\\n/healthz: ok | QA: passed | worker: ${WORKER}\\n→ ready for tag release"
          else
            COLOR=15158332
            MSG="❌ DEV deploy failed — \`$REF\` @ \`$SHORT\`\\nQA: ${QA} | worker: ${WORKER}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"description\":\"$MSG\",\"color\":$COLOR}]}"
