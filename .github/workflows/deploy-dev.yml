name: deploy (dev)

# Triggers on every push to main.
# Flow: build dev-latest image → push GHCR
#       → fly deploy zombied-dev (API)
#       → SSH deploy zombie-dev-worker-ant (bare-metal worker, Tailscale)
#       → wait /healthz green (via Cloudflare Tunnel) → QA smoke → Discord notify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── 0. Credential gate — all DEV vault items must exist ─────────────────
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: 1password/install-cli-action@v1

      - name: Check vault credentials
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VAULT_DEV: ${{ vars.VAULT_DEV }}
          VAULT_PROD: ${{ vars.VAULT_PROD }}
        run: ./scripts/check-credentials.sh

  # ── 1. Build and push dev-latest image to GHCR ──────────────────────────
  build-dev:
    needs: check-credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cross-compile zombied for linux/amd64
        uses: jetsung/setup-zig@v1
        with:
          version: 0.15.2

      - name: Install OpenSSL dev headers (required for pg.zig TLS)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Build linux/amd64 binary
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux
          mkdir -p dist
          cp zig-out/bin/zombied dist/zombied-linux-amd64

      - uses: docker/setup-buildx-action@v4

      - name: Push dev-latest to GHCR
        run: make push-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORMS: linux/amd64

  # ── 2. Deploy to Fly.io DEV ─────────────────────────────────────────────
  deploy-fly-dev:
    runs-on: ubuntu-latest
    needs: build-dev
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_DEV }}/fly-api-token/credential
          DATABASE_URL_API: op://${{ vars.VAULT_DEV }}/planetscale-dev/api-connection-string
          DATABASE_URL_WORKER: op://${{ vars.VAULT_DEV }}/planetscale-dev/worker-connection-string
          REDIS_URL_API: op://${{ vars.VAULT_DEV }}/upstash-dev/api-url
          REDIS_URL_WORKER: op://${{ vars.VAULT_DEV }}/upstash-dev/worker-url
          ENCRYPTION_MASTER_KEY: op://${{ vars.VAULT_DEV }}/encryption-master-key/credential
          GITHUB_APP_ID: op://${{ vars.VAULT_DEV }}/github-app/app-id
          GITHUB_APP_PRIVATE_KEY: op://${{ vars.VAULT_DEV }}/github-app/private-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/publishable-key
          CLERK_SECRET_KEY: op://${{ vars.VAULT_DEV }}/clerk-dev/secret-key

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Fly secrets from vault
        run: |
          flyctl secrets set \
            LOG_LEVEL="debug" \
            DATABASE_URL_API="$DATABASE_URL_API" \
            DATABASE_URL_WORKER="$DATABASE_URL_WORKER" \
            REDIS_URL_API="$REDIS_URL_API" \
            REDIS_URL_WORKER="$REDIS_URL_WORKER" \
            ENCRYPTION_MASTER_KEY="$ENCRYPTION_MASTER_KEY" \
            GITHUB_APP_ID="$GITHUB_APP_ID" \
            GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" \
            CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY" \
            CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            --app ${{ vars.FLY_APP_DEV }} --stage
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Deploy zombied-dev
        run: flyctl deploy --app ${{ vars.FLY_APP_DEV }} --image ghcr.io/usezombie/zombied:dev-latest --config deploy/fly/zombied-dev/fly.toml --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify Fly machine state (started)
        run: |
          APP="${{ vars.FLY_APP_DEV }}"
          echo "Checking Fly machine state for ${APP}..."
          for i in $(seq 1 12); do
            OUT="$(flyctl machine list --app "${APP}" || true)"
            echo "${OUT}"
            if echo "${OUT}" | grep -qiE '\bstarted\b'; then
              echo "✓ at least one machine is started for ${APP}"
              exit 0
            fi
            echo "attempt ${i}/12: no started machine yet; retrying in 5s..."
            sleep 5
          done
          echo "✗ no started machine found for ${APP} after 60s"
          echo "Fly app status for diagnostics:"
          flyctl status --app "${APP}" || true
          exit 1
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  # ── 3. Deploy DEV worker to bare-metal via Tailscale SSH ─────────────────
  # Skips until zombie-dev-worker-ant bootstrap is complete (M4_001).
  # Enable by setting DEV_WORKER_READY=true in GitHub → Settings → Variables.
  deploy-dev-worker:
    runs-on: ubuntu-latest
    needs: build-dev
    if: vars.DEV_WORKER_READY == 'true'
    steps:
      - name: Load DEV worker secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          WORKER_ANT_SSH_KEY: op://${{ vars.VAULT_DEV }}/zombie-dev-worker-ant/ssh-private-key

      - name: Join Tailscale network
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy zombie-dev-worker-ant
        run: |
          install -m 700 -d ~/.ssh
          ANT_KEY="$RUNNER_TEMP/dev-worker-ant.key"
          printf '%s\n' "$WORKER_ANT_SSH_KEY" > "$ANT_KEY"
          chmod 600 "$ANT_KEY"
          ssh -i "$ANT_KEY" -o StrictHostKeyChecking=no zombie-dev-worker-ant \
            "cd /opt/zombie && ./deploy.sh"

  # ── 4. Wait for Fly DEV to go green (via Cloudflare Tunnel) ─────────────
  verify-dev:
    runs-on: ubuntu-latest
    needs: deploy-fly-dev
    steps:
      - name: Wait for zombied-dev to go green
        # Poll /healthz via Cloudflare Tunnel until green or timeout (3 min).
        # Prints HTTP status + response body on each attempt for diagnostics.
        run: |
          echo "Waiting for zombied-dev..."
          STATUS="000"
          for i in $(seq 1 18); do
            BODY=$(curl -sf -w "\n%{http_code}" \
              https://api-dev.usezombie.com/healthz 2>&1 || echo -e "\n000")
            STATUS=$(echo "$BODY" | tail -1)
            RESP=$(echo "$BODY" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS body=$RESP — retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 180s (last status=$STATUS)"
            exit 1
          fi

      - name: Check /readyz
        run: |
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true'

  # ── 4. QA smoke tests against DEV ───────────────────────────────────────
  qa-dev:
    runs-on: ubuntu-latest
    needs: verify-dev
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: ui/packages/app

      - name: Run smoke tests against DEV
        run: bun run test:e2e:smoke
        working-directory: ui/packages/app
        env:
          BASE_URL: https://api-dev.usezombie.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-dev-${{ github.sha }}
          path: ui/packages/app/playwright-report/
          retention-days: 7

  # ── 5. Discord notify ────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [qa-dev]
    if: always()
    steps:
      - name: Load Discord webhook from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DISCORD_WEBHOOK: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Notify Discord
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          REF="${{ github.ref_name }}"

          if [ "${{ needs.qa-dev.result }}" = "success" ]; then
            COLOR=3066993
            MSG="✅ DEV deploy green — \`$REF\` @ \`$SHORT\`\\n/healthz: ok | QA: passed\\n→ ready for tag release"
          else
            COLOR=15158332
            MSG="❌ DEV deploy failed — \`$REF\` @ \`$SHORT\`\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"description\":\"$MSG\",\"color\":$COLOR}]}"
