name: ci

on:
  push:
  pull_request:

jobs:
  # ── zombied: Zig lint ────────────────────────────────────────────────────
  lint-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make lint-zig

  # ── zombied: Zig unit tests ──────────────────────────────────────────────
  test-zig:
    runs-on: ubuntu-latest
    needs: lint-zig
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make test-unit-zombied

  # ── CLI: lint + build ────────────────────────────────────────────────────
  lint-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── CLI: unit tests ──────────────────────────────────────────────────────
  test-cli:
    runs-on: ubuntu-latest
    needs: lint-cli
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  # ── website: lint (ESLint + tsc) ─────────────────────────────────────────
  lint-website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  # ── website: unit tests (vitest) ─────────────────────────────────────────
  test-website:
    runs-on: ubuntu-latest
    needs: lint-website
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: website/coverage/lcov.info
          flags: website
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-coverage
          path: website/coverage/
          retention-days: 7

  # ── website: Playwright smoke (every push, dev server) ───────────────────
  qa-website:
    runs-on: ubuntu-latest
    needs: lint-website
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run smoke tests
        run: bun run test:e2e:smoke
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7

  # ── Push dev container on develop branch merges ──────────────────────────
  push-dev:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [test-zig, test-cli, test-website]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push dev image
        run: |
          make build-dev
          make push-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
