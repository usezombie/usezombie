name: lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-zig:
    runs-on: ubuntu-latest
    env:
      ZLINT_VERSION: v0.7.9
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev
      - name: Install ZLint
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/DonIsaac/zlint/releases/download/${ZLINT_VERSION}/zlint-linux-x86_64" -o "$RUNNER_TEMP/bin/zlint"
          chmod +x "$RUNNER_TEMP/bin/zlint"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Run Zig lint gate
        run: make lint-zig
      - name: Run pg-drain check
        run: python3 lint-zig.py src

  lint-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Run website lint gate
        run: make lint-website

  lint-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Install zombiectl dependencies
        run: bun install --frozen-lockfile
        working-directory: zombiectl
      - name: Run app and CLI lint gate
        run: make lint-apps

  lint-ci:
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.11
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C "$RUNNER_TEMP/bin" actionlint
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Run CI lint gate
        run: make lint-ci

  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install root dependencies (pulls @redocly/cli)
        run: bun install --frozen-lockfile
      - name: Assert public/openapi.json is produced purely from YAML
        run: |
          # Delete the committed JSON first, then let `make openapi`
          # rebundle it from the YAML source alone. If `git diff` then shows
          # any delta vs HEAD, either the YAML is out of sync or someone
          # hand-edited the JSON.
          rm public/openapi.json
          make openapi
          if ! git diff --exit-code public/openapi.json; then
            echo "::error::public/openapi.json drifted from public/openapi/**.yaml."
            echo "::error::Run 'make openapi' locally and commit the result."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    needs: [lint-zig, lint-website, lint-apps, lint-ci, lint-openapi]
    steps:
      - name: Preserve legacy lint check name
        run: echo "All lint lanes passed"
