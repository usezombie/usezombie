name: qa-smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Run backend smoke QA gate
        run: make _test_e2e_smoke

  qa-website-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Restore Playwright browser cache
        id: playwright-cache-website
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-website-${{ hashFiles('ui/packages/website/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-website-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-website.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/website
      - name: Run website smoke QA gate
        run: make _qa_website_smoke

  qa-app-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Restore Playwright browser cache
        id: playwright-cache-app
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-app-${{ hashFiles('ui/packages/app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-app-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-app.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/app
      - name: Run app smoke QA gate
        run: make qa_app_smoke

  qa-smoke:
    runs-on: ubuntu-latest
    needs: [qa-backend-smoke, qa-website-smoke, qa-app-smoke]
    steps:
      - name: Preserve legacy qa-smoke check name
        run: echo "All qa-smoke lanes passed"
