name: dry

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Restore Playwright browser cache
        id: playwright-cache-website
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-website-${{ hashFiles('ui/packages/website/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-website-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-website.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/website
      - name: Run website dry Playwright lane
        run: make _dry_website

  dry-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Restore Playwright browser cache
        id: playwright-cache-app
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-app-${{ hashFiles('ui/packages/app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-app-
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache-app.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install chromium
          else
            bunx playwright install --with-deps chromium
          fi
        working-directory: ui/packages/app
      - name: Run app dry lane
        run: make dry-app

  dry:
    runs-on: ubuntu-latest
    needs: [dry-website, dry-app]
    steps:
      - name: All dry lanes green
        run: echo "All dry lanes passed"
