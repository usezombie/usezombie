name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 0. Tag / version contract ──────────────────────────────────────────
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches VERSION file
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(cat VERSION)
          if [ "$TAG" != "$VERSION" ]; then
            echo "✗ tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "✓ tag v$TAG matches VERSION $VERSION"

  # ── 1. Standalone binaries: cross-compile with Zig ─────────────────────
  # Build inside Alpine (musl-native) so static OpenSSL archives are musl-
  # compatible.  Produces fully static binaries that run on any Linux.
  binaries-linux:
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            artifact: zombied-linux-amd64
            os: ubuntu-latest
            arch: x86_64
          - target: aarch64-linux
            artifact: zombied-linux-arm64
            os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    container:
      image: mirror.gcr.io/library/alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz binutils
          mkdir -p /usr/lib/${{ matrix.arch }}-linux-gnu /usr/include/${{ matrix.arch }}-linux-gnu
          ln -sf /usr/lib/libssl.a /usr/lib/${{ matrix.arch }}-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/${{ matrix.arch }}-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/${{ matrix.arch }}-linux-gnu/openssl

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Verify static ELF — zero NEEDED, no INTERP
        run: |
          for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
            test -f "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
              echo "FAIL: $bin has dynamic NEEDED entries"
              readelf -d "$bin" | grep NEEDED
              exit 1
            fi
            if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
              echo "FAIL: $bin has INTERP (dynamic linker) section"
              exit 1
            fi
            echo "✓ $bin: fully static (zero NEEDED, no INTERP)"
          done

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  binaries-macos:
    needs: verify-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/zombied-darwin-arm64
          chmod +x dist/zombied-darwin-arm64
          tar czf dist/zombied-darwin-arm64.tar.gz -C dist zombied-darwin-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: zombied-darwin-arm64
          path: dist/zombied-darwin-arm64.tar.gz

  # ── 2. Docker: multi-arch build + push stable to GHCR ──────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [verify-tag, binaries-linux, binaries-macos]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-amd64
          path: dist

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-arm64
          path: dist

      - name: Extract binaries
        run: |
          cd dist
          tar xzf zombied-linux-amd64.tar.gz
          tar xzf zombied-linux-arm64.tar.gz

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push production image
        run: make push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── 3. CLI: publish zombiectl to npm ────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: zombiectl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org

      - name: Load npm token from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://${{ vars.VAULT_PROD }}/npm-publish-token/credential

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  # ── 4. GitHub Release: changelog + attach binaries ─────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [binaries-linux, binaries-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Verify: DEV gate before PROD rollout ──────────────────────────────
  verify-dev-gate:
    runs-on: ubuntu-latest
    needs: [create-release, docker]
    steps:
      - name: Verify DEV readiness gate
        run: |
          echo "Checking DEV API health before PROD rollout..."
          curl -sf https://api-dev.usezombie.com/healthz >/dev/null
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true' >/dev/null
          echo "✓ DEV readiness gate passed"

  # ── 6. Deploy: prod API ───────────────────────────────────────────────
  deploy-prod-api:
    runs-on: ubuntu-latest
    needs: verify-dev-gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_PROD }}/fly-api-token/credential
          DATABASE_URL_API: op://${{ vars.VAULT_PROD }}/planetscale-prod/api-connection-string
          DATABASE_URL_WORKER: op://${{ vars.VAULT_PROD }}/planetscale-prod/worker-connection-string
          DATABASE_URL_MIGRATOR: op://${{ vars.VAULT_PROD }}/planetscale-prod/migrator-connection-string
          REDIS_URL_API: op://${{ vars.VAULT_PROD }}/upstash-prod/api-url
          REDIS_URL_WORKER: op://${{ vars.VAULT_PROD }}/upstash-prod/worker-url
          ENCRYPTION_MASTER_KEY: op://${{ vars.VAULT_PROD }}/encryption-master-key/credential
          POSTHOG_API_KEY: op://${{ vars.VAULT_PROD }}/posthog-prod/credential
          GITHUB_APP_ID: op://${{ vars.VAULT_PROD }}/github-app/app-id
          GITHUB_APP_PRIVATE_KEY: op://${{ vars.VAULT_PROD }}/github-app/private-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_PROD }}/clerk-prod/publishable-key
          CLERK_SECRET_KEY: op://${{ vars.VAULT_PROD }}/clerk-prod/secret-key
          GRAFANA_OTLP_ENDPOINT: op://${{ vars.VAULT_PROD }}/grafana-prod/otlp-endpoint
          GRAFANA_OTLP_INSTANCE_ID: op://${{ vars.VAULT_PROD }}/grafana-prod/instance-id
          GRAFANA_OTLP_API_KEY: op://${{ vars.VAULT_PROD }}/grafana-prod/api-key

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage Fly secrets from vault (applied on next deploy)
        run: |
          flyctl secrets set \
            DATABASE_URL_API="$DATABASE_URL_API" \
            DATABASE_URL_WORKER="$DATABASE_URL_WORKER" \
            DATABASE_URL_MIGRATOR="$DATABASE_URL_MIGRATOR" \
            REDIS_URL_API="$REDIS_URL_API" \
            REDIS_URL_WORKER="$REDIS_URL_WORKER" \
            ENCRYPTION_MASTER_KEY="$ENCRYPTION_MASTER_KEY" \
            POSTHOG_API_KEY="$POSTHOG_API_KEY" \
            GITHUB_APP_ID="$GITHUB_APP_ID" \
            GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" \
            CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY" \
            CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            GRAFANA_OTLP_ENDPOINT="$GRAFANA_OTLP_ENDPOINT" \
            GRAFANA_OTLP_INSTANCE_ID="$GRAFANA_OTLP_INSTANCE_ID" \
            GRAFANA_OTLP_API_KEY="$GRAFANA_OTLP_API_KEY" \
            --stage \
            --app "${{ vars.FLY_APP_PROD }}"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Deploy PROD API to Fly.io
        run: |
          flyctl deploy \
            --app ${{ vars.FLY_APP_PROD }} \
            --image ghcr.io/usezombie/zombied:latest \
            --config deploy/fly/zombied-prod/fly.toml \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify PROD API rollout via Cloudflare Tunnel
        run: |
          echo "Waiting for PROD API..."
          STATUS=000
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://api.usezombie.com/healthz || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 240s"
            exit 1
          fi
          curl -sf https://api.usezombie.com/readyz | jq -e '.ready == true'

  # ── 7. Deploy: canary worker (first host) ───────────────────────────────
  deploy-prod-canary:
    runs-on: ubuntu-latest
    needs: deploy-prod-api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD worker secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Parse canary host from fleet config
        id: canary
        run: |
          HOSTS='${{ vars.PROD_WORKER_HOSTS }}'
          CANARY=$(echo "$HOSTS" | jq -r '.[0]')
          {
            echo "name=$(echo "$CANARY" | jq -r '.name')"
            echo "host=$(echo "$CANARY" | jq -r '.host')"
            echo "vault_key=$(echo "$CANARY" | jq -r '.vault_key')"
            echo "fleet_count=$(echo "$HOSTS" | jq 'length')"
          } >> "$GITHUB_OUTPUT"

      - name: Load canary SSH key
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          WORKER_SSH_KEY: op://${{ vars.VAULT_PROD }}/${{ steps.canary.outputs.vault_key }}/ssh-private-key

      - name: Join Tailscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy canary worker
        run: |
          KEY_FILE="$RUNNER_TEMP/worker-canary.key"
          printf '%s\n' "$WORKER_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          VERSION="${GITHUB_REF#refs/tags/}"
          HOST="${{ steps.canary.outputs.host }}"
          NAME="${{ steps.canary.outputs.name }}"

          echo "Deploying canary: $NAME ($HOST) ..."
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$HOST" \
            "cd /opt/zombie/deploy && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh executor $VERSION && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh worker $VERSION"
          echo "✓ Canary $NAME deployed"

  # ── 8. Deploy: remaining fleet (with approval gate) ─────────────────────
  deploy-prod-fleet:
    runs-on: ubuntu-latest
    needs: deploy-prod-canary
    environment: production-fleet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD worker secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Join Tailscale network
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy remaining fleet sequentially
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          HOSTS='${{ vars.PROD_WORKER_HOSTS }}'
          TOTAL=$(echo "$HOSTS" | jq 'length')
          VERSION="${GITHUB_REF#refs/tags/}"
          SUMMARY=""
          FAILED=0

          # Skip index 0 (canary, already deployed)
          for i in $(seq 1 $((TOTAL - 1))); do
            ENTRY=$(echo "$HOSTS" | jq -r ".[$i]")
            NAME=$(echo "$ENTRY" | jq -r '.name')
            HOST=$(echo "$ENTRY" | jq -r '.host')
            VAULT_KEY=$(echo "$ENTRY" | jq -r '.vault_key')

            echo "Deploying $NAME ($HOST) [$((i+1))/$TOTAL] ..."
            KEY_FILE="$RUNNER_TEMP/worker-${NAME}.key"
            SSH_KEY=$(op read "op://${{ vars.VAULT_PROD }}/${VAULT_KEY}/ssh-private-key")
            printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"

            if ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$HOST" \
              "cd /opt/zombie/deploy && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh executor $VERSION && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh worker $VERSION"; then
              echo "✓ $NAME deployed"
              SUMMARY="${SUMMARY}✅ ${NAME}\\n"
            else
              echo "✗ $NAME deploy failed"
              SUMMARY="${SUMMARY}❌ ${NAME}\\n"
              FAILED=$((FAILED + 1))
            fi
            rm -f "$KEY_FILE"
          done

          # Post fleet-level Discord summary
          if [[ -n "${DISCORD_WEBHOOK_URL:-}" ]]; then
            if [[ "$FAILED" -eq 0 ]]; then
              COLOR=3066993
              MSG="✅ **Fleet rollout complete** — ${VERSION}\\n${SUMMARY}"
            else
              COLOR=15158332
              MSG="⚠️ **Fleet rollout partial** — ${VERSION} (${FAILED} failed)\\n${SUMMARY}"
            fi
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"description\":\"$MSG\",\"color\":$COLOR}]}" \
              || echo "Warning: Discord fleet summary failed (non-fatal)"
          fi

          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi
