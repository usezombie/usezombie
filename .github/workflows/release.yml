name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 0a. Credential gate — all PROD vault items must exist ─────────────────
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: 1password/install-cli-action@v3

      - name: Check vault credentials
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VAULT_DEV: ${{ vars.VAULT_DEV }}
          VAULT_PROD: ${{ vars.VAULT_PROD }}
        run: ./playbooks/002_preflight/00_gate.sh

  # ── 0b. Tag / version contract ─────────────────────────────────────────
  verify-tag:
    runs-on: ubuntu-latest
    needs: check-credentials
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches VERSION file
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(cat VERSION)
          if [ "$TAG" != "$VERSION" ]; then
            echo "✗ tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "✓ tag v$TAG matches VERSION $VERSION"

  # ── 1a. x86_64 binary: build inside Alpine container ──────────────────
  # JS actions work inside Alpine on x86_64 runners.
  # Alpine's openssl-libs-static provides musl-native .a — fully static output.
  binaries-linux-x86:
    needs: verify-tag
    runs-on: ubuntu-latest
    container:
      image: mirror.gcr.io/library/alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache git openssl-dev openssl-libs-static ca-certificates xz tar
          mkdir -p /usr/lib/x86_64-linux-gnu /usr/include/x86_64-linux-gnu
          ln -sf /usr/lib/libssl.a /usr/lib/x86_64-linux-gnu/libssl.a
          ln -sf /usr/lib/libcrypto.a /usr/lib/x86_64-linux-gnu/libcrypto.a
          ln -sf /usr/include/openssl /usr/include/x86_64-linux-gnu/openssl

      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Build (x86_64-linux)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl -Dgit-commit="${GITHUB_SHA::7}"

      - name: Verify static ELF — zero NEEDED, no INTERP (x86_64-linux)
        run: |
          for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
            test -f "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
              echo "FAIL: $bin has dynamic NEEDED entries"
              readelf -d "$bin" | grep NEEDED
              exit 1
            fi
            if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
              echo "FAIL: $bin has INTERP (dynamic linker) section"
              exit 1
            fi
            echo "✓ $bin: fully static (zero NEEDED, no INTERP)"
          done

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/zombied-linux-amd64
          chmod +x dist/zombied-linux-amd64
          tar czf dist/zombied-linux-amd64.tar.gz -C dist zombied-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: zombied-linux-amd64
          path: dist/zombied-linux-amd64.tar.gz

      # Upload unpackaged binary for runtime compat verification job below.
      - uses: actions/upload-artifact@v7
        with:
          name: zombied-linux-amd64-ci
          path: dist/zombied-linux-amd64
          retention-days: 1

  # ── 1b. Runtime compat: verify release x86_64 binary runs on all target envs ──
  # Mirrors verify-runtime-compat from cross-compile.yml.
  # Release binaries must pass before Docker image is pushed to GHCR.
  verify-runtime-compat:
    runs-on: ubuntu-latest
    needs: binaries-linux-x86
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: zombied-linux-amd64-ci
          path: dist

      - name: Make binary executable
        run: chmod +x dist/zombied-linux-amd64

      - name: Verify in debian:bookworm-slim (Fly.io target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:bookworm-slim \
            sh -c 'ldd /test/zombied-linux-amd64 2>&1 | grep -q "not a dynamic executable" && echo "✓ bookworm-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in bookworm-slim"; ldd /test/zombied-linux-amd64 2>&1; exit 1)'

      - name: Verify in alpine:3.21 (musl-native)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            mirror.gcr.io/library/alpine:3.21 \
            sh -c 'ldd /test/zombied-linux-amd64 2>&1 | grep -qiE "not a dynamic|Not a valid dynamic" && echo "✓ alpine: static binary confirmed" || (echo "FAIL: dynamic deps found in alpine"; ldd /test/zombied-linux-amd64 2>&1; exit 1)'

      - name: Verify in debian:trixie-slim (bare-metal worker target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            debian:trixie-slim \
            sh -c 'ldd /test/zombied-linux-amd64 2>&1 | grep -q "not a dynamic executable" && echo "✓ trixie-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in trixie-slim"; ldd /test/zombied-linux-amd64 2>&1; exit 1)'

  # ── 1c. aarch64 binary: bare runner + docker run alpine ───────────────
  # JS actions cannot run inside Alpine containers on ARM64 runners.
  # Solution: use the bare ubuntu-24.04-arm runner and invoke docker run
  # to execute the Zig build inside Alpine — same approach as `make build-linux-alpine`.
  binaries-linux-aarch64:
    needs: verify-tag
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Build aarch64-linux inside Alpine (musl-native static OpenSSL)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/zig-out/bin"
          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -v "$GITHUB_WORKSPACE/zig-out:/zig-out" \
            mirror.gcr.io/library/alpine:3.21 \
            sh -c '
              set -e
              apk add --no-cache openssl-dev openssl-libs-static ca-certificates xz wget binutils >/dev/null 2>&1
              mkdir -p /usr/lib/aarch64-linux-gnu /usr/include/aarch64-linux-gnu
              ln -sf /usr/lib/libssl.a    /usr/lib/aarch64-linux-gnu/libssl.a
              ln -sf /usr/lib/libcrypto.a /usr/lib/aarch64-linux-gnu/libcrypto.a
              ln -sf /usr/include/openssl /usr/include/aarch64-linux-gnu/openssl
              cp -a /src/. /build
              cd /build
              echo "  fetching zig 0.15.2 for aarch64..."
              wget -q https://ziglang.org/download/0.15.2/zig-aarch64-linux-0.15.2.tar.xz -O /tmp/zig.tar.xz
              echo "958ed7d1e00d0ea76590d27666efbf7a932281b3d7ba0c6b01b0ff26498f667f  /tmp/zig.tar.xz" | sha256sum -c -
              (cd /tmp && tar xf zig.tar.xz)
              export PATH="/tmp/zig-aarch64-linux-0.15.2:$PATH"
              echo "  compiling zombied + zombied-executor (aarch64-linux)..."
              zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl -Dgit-commit="${GITHUB_SHA::7}"
              for bin in zig-out/bin/zombied zig-out/bin/zombied-executor; do
                test -f "$bin"
                if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
                  echo "FAIL: $bin has dynamic NEEDED entries"
                  readelf -d "$bin" | grep NEEDED
                  exit 1
                fi
                if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
                  echo "FAIL: $bin has INTERP (dynamic linker) section"
                  exit 1
                fi
                echo "  ✓ $bin: fully static (zero NEEDED, no INTERP)"
              done
              cp zig-out/bin/zombied          /zig-out/bin/zombied
              cp zig-out/bin/zombied-executor /zig-out/bin/zombied-executor
            '

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/zombied-linux-arm64
          chmod +x dist/zombied-linux-arm64
          tar czf dist/zombied-linux-arm64.tar.gz -C dist zombied-linux-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: zombied-linux-arm64
          path: dist/zombied-linux-arm64.tar.gz

  binaries-macos:
    needs: verify-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos -Dgit-commit="${GITHUB_SHA::7}"

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/zombied-darwin-arm64
          chmod +x dist/zombied-darwin-arm64
          tar czf dist/zombied-darwin-arm64.tar.gz -C dist zombied-darwin-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: zombied-darwin-arm64
          path: dist/zombied-darwin-arm64.tar.gz

  # ── 2. Docker: multi-arch build + push stable to GHCR ──────────────────
  push-prod:
    runs-on: ubuntu-latest
    needs: [verify-tag, binaries-linux-x86, binaries-linux-aarch64, binaries-macos, verify-runtime-compat]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-amd64
          path: dist

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-arm64
          path: dist

      - name: Extract binaries
        run: |
          cd dist
          tar xzf zombied-linux-amd64.tar.gz
          tar xzf zombied-linux-arm64.tar.gz

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push production image
        run: make push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── 3. CLI: publish @usezombie/zombiectl to npm ─────────────────────────
  # Tag lifecycle:
  #   - Release publishes to `next` dist-tag (--tag next)
  #   - After acceptance testing, promote manually:
  #     npm dist-tag add @usezombie/zombiectl@<ver> latest
  #   - Users installing without a tag pin (`npm install -g @usezombie/zombiectl`)
  #     resolve `latest`, not `next`
  npm:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: zombiectl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Load npm token from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://${{ vars.VAULT_PROD }}/npm-publish-token/credential

      - name: Sync package.json version from git tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version

      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Publish to npm (skip if version already exists)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if npm view "@usezombie/zombiectl@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
            echo "✓ @usezombie/zombiectl@${VERSION} already published — skipping"
          else
            npm publish --provenance --access public --tag next
          fi
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  # ── 4. GitHub Release: changelog + attach binaries ─────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [binaries-linux-x86, binaries-linux-aarch64, binaries-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Verify: DEV gate before PROD rollout ──────────────────────────────
  verify-dev-gate:
    runs-on: ubuntu-latest
    needs: [create-release, push-prod]
    steps:
      - name: Verify DEV readiness gate
        run: |
          echo "Checking DEV API health before PROD rollout..."
          curl -sf https://api-dev.usezombie.com/healthz >/dev/null
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true' >/dev/null
          echo "✓ DEV readiness gate passed"

  # ── 6. Deploy: prod API ───────────────────────────────────────────────
  deploy-fly-prod:
    runs-on: ubuntu-latest
    needs: verify-dev-gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_PROD }}/fly-api-token/credential
          TUNNEL_TOKEN: op://${{ vars.VAULT_PROD }}/cloudflare-tunnel-prod/credential
          DATABASE_URL_API: op://${{ vars.VAULT_PROD }}/planetscale-prod/api-connection-string
          DATABASE_URL_WORKER: op://${{ vars.VAULT_PROD }}/planetscale-prod/worker-connection-string
          DATABASE_URL_MIGRATOR: op://${{ vars.VAULT_PROD }}/planetscale-prod/migrator-connection-string
          REDIS_URL_API: op://${{ vars.VAULT_PROD }}/upstash-prod/api-url
          REDIS_URL_WORKER: op://${{ vars.VAULT_PROD }}/upstash-prod/worker-url
          ENCRYPTION_MASTER_KEY: op://${{ vars.VAULT_PROD }}/encryption-master-key/credential
          POSTHOG_API_KEY: op://${{ vars.VAULT_PROD }}/posthog-prod/credential
          GITHUB_APP_ID: op://${{ vars.VAULT_PROD }}/github-app/app-id
          GITHUB_APP_PRIVATE_KEY: op://${{ vars.VAULT_PROD }}/github-app/private-key
          CLERK_PUBLISHABLE_KEY: op://${{ vars.VAULT_PROD }}/clerk-prod/publishable-key
          CLERK_SECRET_KEY: op://${{ vars.VAULT_PROD }}/clerk-prod/secret-key
          GRAFANA_OTLP_ENDPOINT: op://${{ vars.VAULT_PROD }}/grafana-prod/otlp-endpoint
          GRAFANA_OTLP_INSTANCE_ID: op://${{ vars.VAULT_PROD }}/grafana-prod/instance-id
          GRAFANA_OTLP_API_KEY: op://${{ vars.VAULT_PROD }}/grafana-prod/api-key
          OIDC_JWKS_URL: op://${{ vars.VAULT_PROD }}/clerk-prod/jwks-url
          OIDC_ISSUER: op://${{ vars.VAULT_PROD }}/clerk-prod/issuer

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage Fly secrets from vault (applied on next deploy)
        run: |
          flyctl secrets set \
            DATABASE_URL_API="$DATABASE_URL_API" \
            DATABASE_URL_WORKER="$DATABASE_URL_WORKER" \
            DATABASE_URL_MIGRATOR="$DATABASE_URL_MIGRATOR" \
            REDIS_URL_API="$REDIS_URL_API" \
            REDIS_URL_WORKER="$REDIS_URL_WORKER" \
            ENCRYPTION_MASTER_KEY="$ENCRYPTION_MASTER_KEY" \
            POSTHOG_API_KEY="$POSTHOG_API_KEY" \
            GITHUB_APP_ID="$GITHUB_APP_ID" \
            GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" \
            CLERK_PUBLISHABLE_KEY="$CLERK_PUBLISHABLE_KEY" \
            CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            OIDC_JWKS_URL="$OIDC_JWKS_URL" \
            OIDC_ISSUER="$OIDC_ISSUER" \
            OIDC_PROVIDER="clerk" \
            GRAFANA_OTLP_ENDPOINT="$GRAFANA_OTLP_ENDPOINT" \
            GRAFANA_OTLP_INSTANCE_ID="$GRAFANA_OTLP_INSTANCE_ID" \
            GRAFANA_OTLP_API_KEY="$GRAFANA_OTLP_API_KEY" \
            --stage \
            --app "${{ vars.FLY_APP_PROD }}"
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Deploy PROD API to Fly.io
        run: |
          flyctl deploy \
            --app ${{ vars.FLY_APP_PROD }} \
            --image ghcr.io/usezombie/zombied:latest \
            --config deploy/fly/zombied-prod/fly.toml \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify Fly machine state (deploy settled)
        run: |
          APP="${{ vars.FLY_APP_PROD }}"
          echo "Checking Fly machine state for ${APP}..."
          for i in $(seq 1 12); do
            OUT="$(flyctl machine list --app "${APP}" || true)"
            echo "${OUT}"
            if echo "${OUT}" | grep -qiE '\bstarted\b'; then
              echo "✓ at least one machine is in started state for ${APP}"
              exit 0
            fi
            echo "attempt ${i}/12: no settled machine yet; retrying in 5s..."
            sleep 5
          done
          echo "✗ no settled machine found for ${APP} after 60s"
          echo "Fly app status for diagnostics:"
          flyctl status --app "${APP}" || true
          timeout 30s flyctl logs --app "${APP}" || true
          exit 1
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Ensure restart-policy always on prod machines
        # Set restart-policy=always so Fly self-heals the machine on crash.
        run: |
          APP="${{ vars.FLY_APP_PROD }}"
          for MID in $(flyctl machine list --app "$APP" --json | jq -r '.[].id'); do
            flyctl machine update "$MID" --restart always --app "$APP" --yes
          done
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Ensure cloudflared-prod tunnel is running
        # cloudflared-prod bridges Cloudflare Edge to zombied-prod.internal:3000 over 6PN.
        # If its machines are stopped/crashed, every /healthz poll returns status=000.
        # Restart stopped machines or deploy from scratch if no machines exist.
        # Sync TUNNEL_TOKEN from vault on every deploy so a rotated secret is always
        # pushed before we check tunnel health — prevents "Invalid tunnel secret" failures.
        run: |
          TUNNEL_APP="cloudflared-prod"
          TUNNEL_CONFIG="deploy/fly/cloudflared-prod/fly.toml"
          echo "Syncing tunnel token from vault..."
          flyctl secrets set TUNNEL_TOKEN="$TUNNEL_TOKEN" --app "$TUNNEL_APP"
          echo "Checking tunnel connector ($TUNNEL_APP)..."
          MACHINES="$(flyctl machine list --app "$TUNNEL_APP" --json 2>/dev/null || echo '[]')"
          RUNNING="$(echo "$MACHINES" | jq '[.[] | select(.state == "started")] | length')"
          TOTAL="$(echo "$MACHINES" | jq 'length')"
          echo "  machines: $RUNNING/$TOTAL running"
          if [ "$RUNNING" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
            echo "  ▲ no running machines — restarting..."
            for MID in $(echo "$MACHINES" | jq -r '.[].id'); do
              flyctl machine start "$MID" --app "$TUNNEL_APP" || true
            done
            echo "  waiting 15s for tunnel reconnect..."
            sleep 15
          elif [ "$TOTAL" -eq 0 ]; then
            echo "  ▲ no machines found — deploying $TUNNEL_APP from scratch..."
            flyctl deploy --app "$TUNNEL_APP" --config "$TUNNEL_CONFIG" --wait-timeout 60 \
              || { echo "  ✗ flyctl deploy failed for $TUNNEL_APP — check logs above"; true; }
            echo "  waiting 15s for tunnel reconnect..."
            sleep 15
          else
            echo "  ✓ tunnel is running"
          fi
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify PROD API rollout via Cloudflare Tunnel
        run: |
          echo "Waiting for PROD API..."
          STATUS=000
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://api.usezombie.com/healthz || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 240s"
            exit 1
          fi
          curl -sf https://api.usezombie.com/readyz | jq -e '.ready == true'

  # ── 7. Deploy: canary worker (first host) ───────────────────────────────
  # Skips until production worker bootstrap is complete (M4_002).
  # Enable by setting PROD_WORKER_READY=true in GitHub → Settings → Variables.
  deploy-worker-canary-prod:
    runs-on: ubuntu-latest
    needs: deploy-fly-prod
    if: vars.PROD_WORKER_READY == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD worker secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Parse canary host from fleet config
        id: canary
        run: |
          HOSTS='${{ vars.PROD_WORKER_HOSTS }}'
          CANARY=$(echo "$HOSTS" | jq -r '.[0]')
          {
            echo "name=$(echo "$CANARY" | jq -r '.name')"
            echo "host=$(echo "$CANARY" | jq -r '.host')"
            echo "vault_key=$(echo "$CANARY" | jq -r '.vault_key')"
            echo "fleet_count=$(echo "$HOSTS" | jq 'length')"
          } >> "$GITHUB_OUTPUT"

      - name: Load canary SSH key
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          WORKER_SSH_KEY: op://${{ vars.VAULT_PROD }}/${{ steps.canary.outputs.vault_key }}/ssh-private-key
          WORKER_DEPLOY_USER: op://${{ vars.VAULT_PROD }}/${{ steps.canary.outputs.vault_key }}/deploy-user

      - name: Join Tailscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy canary worker
        run: |
          KEY_FILE="$RUNNER_TEMP/worker-canary.key"
          printf '%s\n' "$WORKER_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          VERSION="${GITHUB_REF#refs/tags/}"
          HOST="${{ steps.canary.outputs.host }}"
          NAME="${{ steps.canary.outputs.name }}"

          echo "Deploying canary: $NAME ($HOST) ..."
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$WORKER_DEPLOY_USER@$HOST" \
            "cd /opt/zombie/deploy && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh executor $VERSION && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh worker $VERSION"
          rm -f "$KEY_FILE"
          echo "✓ Canary $NAME deployed"

  # ── 8. Deploy: remaining fleet (with approval gate) ─────────────────────
  deploy-worker-fleet-prod:
    runs-on: ubuntu-latest
    needs: deploy-worker-canary-prod
    environment: production-fleet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD worker secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          DISCORD_WEBHOOK_URL: op://${{ vars.VAULT_PROD }}/discord-ci-webhook/credential

      - name: Join Tailscale network
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy remaining fleet sequentially
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          HOSTS='${{ vars.PROD_WORKER_HOSTS }}'
          TOTAL=$(echo "$HOSTS" | jq 'length')
          VERSION="${GITHUB_REF#refs/tags/}"
          SUMMARY=""
          FAILED=0

          # Skip index 0 (canary, already deployed)
          for i in $(seq 1 $((TOTAL - 1))); do
            ENTRY=$(echo "$HOSTS" | jq -r ".[$i]")
            NAME=$(echo "$ENTRY" | jq -r '.name')
            HOST=$(echo "$ENTRY" | jq -r '.host')
            VAULT_KEY=$(echo "$ENTRY" | jq -r '.vault_key')

            echo "Deploying $NAME ($HOST) [$((i+1))/$TOTAL] ..."
            KEY_FILE="$RUNNER_TEMP/worker-${NAME}.key"
            SSH_KEY=$(op read "op://${{ vars.VAULT_PROD }}/${VAULT_KEY}/ssh-private-key")
            DEPLOY_USER=$(op read "op://${{ vars.VAULT_PROD }}/${VAULT_KEY}/deploy-user")
            printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"

            if ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$DEPLOY_USER@$HOST" \
              "cd /opt/zombie/deploy && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh executor $VERSION && sudo DISCORD_WEBHOOK_URL='$DISCORD_WEBHOOK_URL' ./deploy.sh worker $VERSION"; then
              echo "✓ $NAME deployed"
              SUMMARY="${SUMMARY}✅ ${NAME}\\n"
            else
              echo "✗ $NAME deploy failed"
              SUMMARY="${SUMMARY}❌ ${NAME}\\n"
              FAILED=$((FAILED + 1))
            fi
            rm -f "$KEY_FILE"
          done

          # Post fleet-level Discord summary
          if [[ -n "${DISCORD_WEBHOOK_URL:-}" ]]; then
            if [[ "$FAILED" -eq 0 ]]; then
              COLOR=3066993
              MSG="✅ **Fleet rollout complete** — ${VERSION}\\n${SUMMARY}"
            else
              COLOR=15158332
              MSG="⚠️ **Fleet rollout partial** — ${VERSION} (${FAILED} failed)\\n${SUMMARY}"
            fi
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"description\":\"$MSG\",\"color\":$COLOR}]}" \
              || echo "Warning: Discord fleet summary failed (non-fatal)"
          fi

          if [[ "$FAILED" -gt 0 ]]; then
            exit 1
          fi
