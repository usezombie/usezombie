name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 0. Tag / version contract ──────────────────────────────────────────
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches VERSION file
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(cat VERSION)
          if [ "$TAG" != "$VERSION" ]; then
            echo "✗ tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "✓ tag v$TAG matches VERSION $VERSION"

  # ── 1. Standalone binaries: cross-compile with Zig ─────────────────────
  binaries:
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            artifact: zombied-linux-amd64
            os: ubuntu-latest
          - target: aarch64-linux-gnu
            artifact: zombied-linux-arm64
            os: ubuntu-24.04-arm
          - target: aarch64-macos
            artifact: zombied-darwin-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev
      - name: Ensure OpenSSL is available (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 || true

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  # ── 2. Docker: multi-arch build + push stable to GHCR ──────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [verify-tag, binaries]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-amd64
          path: dist

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-arm64
          path: dist

      - name: Extract binaries
        run: |
          cd dist
          tar xzf zombied-linux-amd64.tar.gz
          tar xzf zombied-linux-arm64.tar.gz

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push production image
        run: make push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── 3. CLI: publish zombiectl to npm ────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: zombiectl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org

      - name: Load npm token from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://${{ vars.VAULT_PROD }}/npm-publish-token/credential

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  # ── 4. GitHub Release: changelog + attach binaries ─────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Verify: DEV gate before PROD rollout ──────────────────────────────
  verify-dev-gate:
    runs-on: ubuntu-latest
    needs: [create-release, docker]
    steps:
      - name: Verify DEV readiness gate
        run: |
          echo "Checking DEV API health before PROD rollout..."
          curl -sf https://api-dev.usezombie.com/healthz >/dev/null
          curl -sf https://api-dev.usezombie.com/readyz | jq -e '.ready == true' >/dev/null
          echo "✓ DEV readiness gate passed"

  # ── 6. Deploy: prod API + worker rollout ────────────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: verify-dev-gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load PROD deploy secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://${{ vars.VAULT_PROD }}/fly-api-token/credential
          TAILSCALE_AUTHKEY: op://${{ vars.VAULT_PROD }}/tailscale/authkey
          WORKER_ANT_SSH_KEY: op://${{ vars.VAULT_PROD }}/zombie-prod-worker-ant/ssh-private-key
          WORKER_BIRD_SSH_KEY: op://${{ vars.VAULT_PROD }}/zombie-prod-worker-bird/ssh-private-key

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy PROD API to Fly.io
        run: |
          VERSION=$(cat VERSION)
          flyctl deploy \
            --app ${{ vars.FLY_APP_PROD }} \
            --image ghcr.io/usezombie/zombied:latest \
            --config deploy/fly/zombied-prod/fly.toml \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

      - name: Verify PROD API rollout via Cloudflare Tunnel
        run: |
          echo "Waiting for PROD API..."
          STATUS=000
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://api.usezombie.com/healthz || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz green after $((i * 10))s"
              break
            fi
            echo "  attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "✗ /healthz did not return 200 after 240s"
            exit 1
          fi
          curl -sf https://api.usezombie.com/readyz | jq -e '.ready == true'

      - name: Join Tailscale network for private worker SSH
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy worker nodes over Tailscale SSH
        run: |
          install -m 700 -d ~/.ssh
          ANT_KEY="$RUNNER_TEMP/worker-ant.key"
          BIRD_KEY="$RUNNER_TEMP/worker-bird.key"
          printf '%s\n' "$WORKER_ANT_SSH_KEY" > "$ANT_KEY"
          printf '%s\n' "$WORKER_BIRD_SSH_KEY" > "$BIRD_KEY"
          chmod 600 "$ANT_KEY" "$BIRD_KEY"

          ssh -i "$ANT_KEY" -o StrictHostKeyChecking=no zombie-prod-worker-ant \
            "cd /opt/zombie && ./deploy.sh"
          ssh -i "$BIRD_KEY" -o StrictHostKeyChecking=no zombie-prod-worker-bird \
            "cd /opt/zombie && ./deploy.sh"
