name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── 0. Tag / version contract ──────────────────────────────────────────
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches VERSION file
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(cat VERSION)
          if [ "$TAG" != "$VERSION" ]; then
            echo "✗ tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "✓ tag v$TAG matches VERSION $VERSION"

  # ── 1. Standalone binaries: cross-compile with Zig ─────────────────────
  binaries:
    runs-on: ubuntu-latest
    needs: verify-tag
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            artifact: zombied-linux-amd64
          - target: aarch64-linux
            artifact: zombied-linux-arm64
          - target: x86_64-macos
            artifact: zombied-darwin-amd64
          - target: aarch64-macos
            artifact: zombied-darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/zombied dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  # ── 2. Docker: multi-arch build + push stable to GHCR ──────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [verify-tag, binaries]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-amd64
          path: dist

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: zombied-linux-arm64
          path: dist

      - name: Extract binaries
        run: |
          cd dist
          tar xzf zombied-linux-amd64.tar.gz
          tar xzf zombied-linux-arm64.tar.gz

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push production image
        run: make push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── 3. CLI: publish zombiectl to npm ────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: zombiectl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org

      - name: Load npm token from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://${{ vars.VAULT_PROD }}/npm-publish-token/credential

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  # ── 4. GitHub Release: changelog + attach binaries ─────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Deploy: dev (stub — pending 1Password SSH wiring) ────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: [create-release, docker]
    steps:
      - name: stub — deploy zombied to dev
        run: |
          echo "stub: dev deploy zombied"
          echo "pending: Railway DEV deploy hook wiring via 1Password"

  # ── 6. Deploy: prod blue-green + worker (stub) ──────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: stub — deploy zombied to prod (blue-green)
        run: |
          echo "stub: prod blue-green deploy zombied"
          echo "pending: zombie-worker-{ant,bird}/ssh-private-key Tailscale SSH wiring"
      - name: stub — deploy zombied worker to prod
        run: |
          echo "stub: prod worker deploy"
          echo "pending: zombie-worker-{ant,bird}/ssh-private-key Tailscale SSH wiring"
