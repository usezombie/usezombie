name: Install Check

on:
  pull_request:
    paths:
      - "zombiectl/**"

concurrency:
  group: install-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            name: Linux (x64)
          - runner: windows-latest
            name: Windows (x64)
    runs-on: ${{ matrix.runner }}
    name: install-check — ${{ matrix.name }}
    defaults:
      run:
        working-directory: zombiectl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify --version
        run: node bin/zombiectl.js --version
        shell: bash

      - name: Verify --help
        run: node bin/zombiectl.js --help
        shell: bash
