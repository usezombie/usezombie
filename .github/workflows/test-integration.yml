name: test-integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stub-binary contract suite — executor-side unit tests including the
  # redactor contract table. No Postgres / Redis needed; runs in seconds.
  # Carved out so a redactor regression fails fast in its own job, parallel
  # to the heavy worker integration suite.
  test-integration-stub:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev
      - name: Run stub-binary contract suite
        run: make test-integration-stub

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Start Postgres and Redis via docker compose
        run: docker compose up -d postgres redis

      - name: Wait for Postgres to be ready
        run: |
          echo "→ Waiting for Postgres (TLS-enabled container, may need extra startup time)..."
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U usezombie -d usezombiedb 2>/dev/null && break
            echo "  attempt $i/30 — not ready yet"
            sleep 3
          done
          pg_isready -h localhost -p 5432 -U usezombie -d usezombiedb \
            || { echo "✗ Postgres did not become ready in time"; exit 1; }
          echo "✓ Postgres is ready"

      - name: Wait for Redis to be ready
        run: |
          echo "→ Waiting for Redis..."
          for i in $(seq 1 30); do
            docker compose exec -T redis redis-cli --tls --insecure -a usezombie ping 2>/dev/null | grep -q PONG && break
            echo "  attempt $i/30 — not ready yet"
            sleep 2
          done
          docker compose exec -T redis redis-cli --tls --insecure -a usezombie ping 2>/dev/null | grep -q PONG \
            || { echo "✗ Redis did not become ready in time"; exit 1; }
          echo "✓ Redis is ready"

      - name: Extract Redis TLS CA cert
        run: |
          mkdir -p .tmp
          docker compose cp redis:/tls/server.crt .tmp/redis-ca.crt
          echo "TEST_REDIS_TLS_CA_CERT=$(pwd)/.tmp/redis-ca.crt" >> "$GITHUB_ENV"

      - name: Run all integration tests
        env:
          TEST_DATABASE_URL: postgres://usezombie:usezombie@localhost:5432/usezombiedb
          TEST_REDIS_TLS_URL: rediss://:usezombie@localhost:6379
        run: make test-integration

      - name: Stop services
        if: always()
        run: docker compose down
