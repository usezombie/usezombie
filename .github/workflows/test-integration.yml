name: test-integration

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Start Postgres and Redis via docker compose
        run: docker compose up -d postgres redis

      - name: Wait for Postgres to be ready
        run: |
          echo "→ Waiting for Postgres..."
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U usezombie -d usezombiedb && break
            echo "  attempt $i/30 — not ready yet"
            sleep 2
          done
          docker compose exec -T postgres pg_isready -U usezombie -d usezombiedb \
            || { echo "✗ Postgres did not become ready in time"; exit 1; }
          echo "✓ Postgres is ready"

      - name: Wait for Redis to be ready
        run: |
          echo "→ Waiting for Redis..."
          for i in $(seq 1 30); do
            docker compose exec -T redis redis-cli --tls --insecure -a usezombie ping 2>/dev/null | grep -q PONG && break
            echo "  attempt $i/30 — not ready yet"
            sleep 2
          done
          docker compose exec -T redis redis-cli --tls --insecure -a usezombie ping 2>/dev/null | grep -q PONG \
            || { echo "✗ Redis did not become ready in time"; exit 1; }
          echo "✓ Redis is ready"

      - name: Run all integration tests
        env:
          HANDLER_DB_TEST_URL: postgres://usezombie:usezombie@localhost:5432/usezombiedb
          REDIS_TLS_TEST_URL: rediss://:usezombie@localhost:6379
        run: make test-integration

      - name: Stop services
        if: always()
        run: docker compose down
