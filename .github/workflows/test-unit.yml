name: test-unit

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Install zombiectl dependencies
        run: bun install --frozen-lockfile
        working-directory: zombiectl

      # zombied — Zig unit + integration + depth gate
      - name: Test zombied
        run: make test-zombied

      # zombiectl — CLI unit tests
      - name: Test zombiectl
        run: make test-unit-zombiectl

      # website — Vitest with coverage
      - name: Test website
        run: bun run test:coverage
        working-directory: ui/packages/website
      - name: Upload website coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: website
          files: ui/packages/website/coverage/lcov.info
          fail_ci_if_error: false

      # app — Vitest with coverage
      - name: Test app
        run: bun run test:coverage
        working-directory: ui/packages/app
      - name: Upload app coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: usezombie/usezombie
          flags: apps
          files: ui/packages/app/coverage/lcov.info
          fail_ci_if_error: false
