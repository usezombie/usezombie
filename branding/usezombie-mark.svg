<?xml version="1.0" encoding="UTF-8"?>
<!--
  usezombie brand-mark — the wake-pulse circle.

  Pure cyan-mint disc on a dark background. Per docs/DESIGN_SYSTEM.md
  ("Operational Restraint"): the brand-mark is the ONLY decorative
  use of the --pulse colour — currency, never repeated. The dark
  square background mirrors --bg in dark mode, which is the brand's
  primary surface.

  Use as: GitHub avatar, GitHub org profile (~/Projects/.github/profile/README.md),
  Mintlify docs site favicon, README hero. 512×512 renders crisp at
  every social-card size; SVG scales without artefacts.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="usezombie">
  <title>usezombie</title>
  <rect width="512" height="512" rx="96" fill="#0A0D0E" />
  <circle cx="256" cy="256" r="120" fill="#5EEAD4" />
</svg>
