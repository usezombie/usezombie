<?xml version="1.0" encoding="UTF-8"?>
<!--
  agentsfleet horizontal wordmark — dark-surface variant.

  Transparent background: the wordmark sits directly on whatever
  surface hosts it (docs nav, README, app chrome). Baked backgrounds
  are reserved for self-contained renders (social cards, avatars).
  Type spec: Commit Mono 64px / 500 / -1 tracking, disc r22.
  Canvas 600x160, symmetric 58px side padding.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-label="agentsfleet">
  <title>agentsfleet</title>
  <circle cx="80" cy="80" r="22" fill="#5EEAD4" />
  <text x="130" y="100"
    font-family="Commit Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="64"
    font-weight="500"
    fill="#E6EAEC"
    letter-spacing="-1">agentsfleet</text>
</svg>
