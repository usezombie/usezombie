<?xml version="1.0" encoding="UTF-8"?>
<!--
  usezombie horizontal wordmark — pulse circle + Commit Mono wordmark.

  The wordmark is rendered as SVG <text> referencing the Commit Mono
  family. Consumers that don't ship the font will fall back to the
  generic monospace stack (`monospace`); the wordmark stays
  legible. Use this variant for README headers, social previews,
  press kits, and the docs site nav.

  Width: 720, Height: 160 — keeps sane padding around the text and
  the circle. Scales cleanly to any size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="usezombie">
  <title>usezombie</title>
  <rect width="720" height="160" fill="#0A0D0E" />
  <circle cx="80" cy="80" r="22" fill="#5EEAD4" />
  <text x="130" y="100"
    font-family="Commit Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="64"
    font-weight="500"
    fill="#E6EAEC"
    letter-spacing="-1">usezombie</text>
</svg>
