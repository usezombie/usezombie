<?xml version="1.0" encoding="UTF-8"?>
<!--
  agentsfleet horizontal wordmark — light-surface variant.

  Transparent background; disc in teal-600 (#0D9488) for contrast on
  light surfaces, ink in the brand dark (#0A0D0E). Same geometry as
  the dark variant.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-label="agentsfleet">
  <title>agentsfleet</title>
  <circle cx="80" cy="80" r="22" fill="#0D9488" />
  <text x="130" y="100"
    font-family="Commit Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="64"
    font-weight="500"
    fill="#0A0D0E"
    letter-spacing="-1">agentsfleet</text>
</svg>
