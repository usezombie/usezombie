# UseZombie local dev — Postgres + Redis only
# zombied removed: zig build is run natively via mise, not inside Docker
services:
  postgres:
    image: postgres:17-alpine  # pg-0.0.0 library tested against PG17; upgrade pg dep before bumping to PG18
    environment:
      POSTGRES_USER: usezombie
      POSTGRES_PASSWORD: usezombie
      POSTGRES_DB: usezombiedb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./docker/redis/tls:/tls:ro
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
