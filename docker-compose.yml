# UseZombie local dev — Postgres + Redis + zombied API
# zombied binary must be pre-built for linux before starting zombied service:
#   zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe
#   mkdir -p dist && cp zig-out/bin/zombied dist/zombied-linux-amd64
#   docker compose up zombied
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: usezombie
      POSTGRES_PASSWORD: usezombie
      POSTGRES_DB: usezombiedb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: >
      sh -c '
      apk add --no-cache openssl &&
      mkdir -p /tls &&
      openssl req -x509 -newkey rsa:2048 -nodes
        -keyout /tls/server.key -out /tls/server.crt
        -days 3650 -subj "/CN=redis" 2>/dev/null &&
      redis-server
        --tls-port 6379 --port 0
        --tls-cert-file /tls/server.crt
        --tls-key-file /tls/server.key
        --tls-ca-cert-file /tls/server.crt
        --tls-auth-clients no
        --requirepass usezombie'
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  zombied:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGETARCH: amd64
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # Override DB/Redis to use compose service names instead of localhost
      DATABASE_URL: postgresql://usezombie:usezombie@postgres:5432/usezombiedb
      REDIS_URL: rediss://:usezombie@redis:6379
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
