# UseZombie local dev — Postgres + Redis + zombied API
# `make up` prepares the matching local linux binary in `dist/` and passes
# `TARGETARCH` to docker compose. CI does not use this path.
services:
  postgres:
    image: mirror.gcr.io/library/postgres:18-alpine
    command:
      - sh
      - -c
      - |
        exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_USER: usezombie
      POSTGRES_PASSWORD: usezombie
      POSTGRES_DB: usezombiedb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usezombie -d usezombiedb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl &&
        mkdir -p /tls &&
        openssl req -x509 -newkey rsa:2048 -nodes -keyout /tls/server.key -out /tls/server.crt -days 3650 -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost,DNS:redis,IP:127.0.0.1" 2>/dev/null &&
        redis-server --tls-port 6379 --port 0 --tls-cert-file /tls/server.crt --tls-key-file /tls/server.key --tls-ca-cert-file /tls/server.crt --tls-auth-clients no --requirepass usezombie
    ports:
      - "6379:6379"
    volumes:
      - redis-tls:/tls
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --tls --insecure -a usezombie ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  zombied:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # Local dev defaults: satisfy role-separated startup checks without
      # requiring a checked-in .env file.
      API_KEY: local-dev-api-key
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef # gitleaks:allow
      GITHUB_APP_ID: "12345"
      GITHUB_APP_PRIVATE_KEY: local-dev-private-key
      # Override DB/Redis to use compose service names instead of localhost.
      DATABASE_URL_API: postgresql://usezombie:usezombie@postgres:5432/usezombiedb?application_name=api&sslmode=disable
      DATABASE_URL_WORKER: postgresql://usezombie:usezombie@postgres:5432/usezombiedb?application_name=worker&sslmode=disable
      REDIS_URL_API: rediss://:usezombie@redis:6379/api
      REDIS_URL_WORKER: rediss://:usezombie@redis:6379/worker
      REDIS_TLS_CA_CERT_FILE: /tls/server.crt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - redis-tls:/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  redis-tls:
